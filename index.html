<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VinWin Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F8F8F2;
      --warm-white: #FFFFF5;
      --ink: #101030;
      --ink-light: #404060;
      --terracotta: #D4B800;
      --terracotta-light: #F0E890;
      --sage: #2A6B3A;
      --sage-light: #C8E0CC;
      --gold: #2A6B3A;
      --border: #D8D890;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }

    /* APP */
    #app { display: block; }
    header { background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 0 2rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; gap: 1rem; height: 64px; }
    .header-brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 500; color: var(--ink); white-space: nowrap; flex-shrink: 0; }
    .header-brand span { color: var(--terracotta); font-style: italic; }
    .search-wrap { flex: 1; max-width: 360px; position: relative; }
.search-wrap input { width: 100%; padding: 0.5rem 1rem 0.5rem 2.4rem; border: 1.5px solid var(--border); border-radius: 40px; background: var(--cream); font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem; color: var(--ink); outline: none; transition: border-color 0.2s; }
.search-wrap input:focus { border-color: var(--terracotta); }
.search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
.search-overlay { display: none; }
.search-overlay.active { display: flex; position: fixed; top: 0; left: 0; right: 0; background: var(--warm-white); border-bottom: 1px solid var(--border); z-index: 200; padding: 0; height: 64px; align-items: center; }
.search-overlay-box { width: 100%; padding: 0 1rem; display: flex; align-items: center; gap: 0.8rem; height: 100%; }
.search-overlay-box input { flex: 1; padding: 0.6rem 1rem; border: 1.5px solid var(--border); border-radius: 40px; background: var(--cream); font-family: 'Space Grotesk', sans-serif; font-size: 1rem; color: var(--ink); outline: none; }
.search-overlay-box input:focus { border-color: var(--terracotta); }
.search-cancel { background: none; border: none; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; color: var(--ink-light); cursor: pointer; white-space: nowrap; }
@media (min-width: 769px) { .search-overlay { display: none !important; } }
@media (max-width: 768px) { .search-wrap input { display: none; } .search-icon { pointer-events: all; cursor: pointer; } }
    
    /* LAYOUT */
    .layout { display: flex; min-height: calc(100vh - 64px); }
    aside { width: 220px; flex-shrink: 0; padding: 2rem 1.2rem; border-right: 1px solid var(--border); background: var(--warm-white); position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; }
    .filter-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.6rem; margin-top: 1.4rem; }
    .filter-label:first-child { margin-top: 0; }
    .filter-btn { display: block; width: 100%; text-align: left; padding: 0.4rem 0.6rem; border: none; background: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink-light); cursor: pointer; border-radius: 4px; transition: background 0.15s, color 0.15s; margin-bottom: 0.1rem; }
    .filter-btn:hover { background: var(--cream); color: var(--ink); }
    .filter-btn.active { background: var(--terracotta-light); color: var(--terracotta); font-weight: 500; }
    .tag-pill { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.78rem; border: 1px solid var(--border); margin: 0.2rem 0.15rem; cursor: pointer; transition: background 0.15s, border-color 0.15s; color: var(--ink-light); }
    .tag-pill:hover { background: var(--cream); }
    .tag-pill.active { background: var(--sage-light); border-color: var(--sage); color: var(--sage); }

    /* MAIN */
    main { flex: 1; padding: 2rem; max-width: 900px; }
    .results-info { font-size: 0.82rem; color: var(--ink-light); margin-bottom: 1.5rem; }

    /* GRID */
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.2rem; }
    .recipe-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 8px; padding: 1.4rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; }
    .recipe-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(28,26,23,0.08); border-color: var(--terracotta-light); }
    .card-category { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--terracotta); margin-bottom: 0.5rem; }
    .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 0.5rem; }
    .card-desc { font-size: 0.83rem; color: var(--ink-light); line-height: 1.5; margin-bottom: 0.9rem; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .card-tag { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 20px; border: 1px solid var(--border); color: var(--ink-light); }

    /* DETAIL */
    #detail-view { display: none; }
    .back-btn { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--ink-light); font-size: 0.85rem; cursor: pointer; border: none; background: none; font-family: 'DM Sans', sans-serif; padding: 0; margin-bottom: 2rem; transition: color 0.15s; }
    .back-btn:hover { color: var(--terracotta); }
    .detail-category { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--terracotta); margin-bottom: 0.6rem; }
    .detail-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.8rem; font-weight: 600; line-height: 1.15; color: var(--ink); margin-bottom: 0.8rem; }
    .detail-desc { font-size: 1rem; color: var(--ink-light); font-style: italic; margin-bottom: 1.5rem; max-width: 560px; }
    .detail-meta { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .meta-item { font-size: 0.85rem; color: var(--ink-light); }
    .meta-item strong { color: var(--ink); }
    .servings-ctrl { display: flex; align-items: center; gap: 0.5rem; }
    .servings-ctrl button { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--ink-light); transition: border-color 0.15s, color 0.15s; line-height: 1; }
    .servings-ctrl button:hover { border-color: var(--terracotta); color: var(--terracotta); }
    .servings-ctrl span { font-size: 0.9rem; font-weight: 500; min-width: 1.5rem; text-align: center; }
    .detail-body { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; align-items: start; }
    .ingredients-box h2, .steps-box h2 { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 1.2rem; }
    .ingredients-list { list-style: none; }
    .ingredients-list li { display: flex; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; line-height: 1.4; }
    .ingredients-list li:last-child { border-bottom: none; }
    .ing-amount { color: var(--terracotta); font-weight: 500; white-space: nowrap; min-width: 70px; flex-shrink: 0; }
    .ing-name { color: var(--ink); }
    .steps-list { list-style: none; }
    .step-item { display: flex; gap: 1.2rem; margin-bottom: 1.8rem; cursor: pointer; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--cream); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 500; color: var(--ink-light); flex-shrink: 0; margin-top: 0.1rem; transition: background 0.2s, border-color 0.2s, color 0.2s; }
    .step-item.done .step-num { background: var(--sage-light); border-color: var(--sage); color: var(--sage); }
    .step-content h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--ink); margin-bottom: 0.3rem; }
    .step-content p { font-size: 0.9rem; color: var(--ink-light); line-height: 1.6; }
    .step-item.done .step-content h3, .step-item.done .step-content p { opacity: 0.4; text-decoration: line-through; text-decoration-color: var(--sage); }
    /* Inline ingredient highlight in steps */
    .ing-inline { color: var(--terracotta); font-weight: 500; }
    .notes-box { margin-top: 2.5rem; padding: 1.4rem; background: var(--warm-white); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 4px; }
    .notes-box h3 { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.7rem; }
    .notes-box p { font-size: 0.88rem; color: var(--ink-light); line-height: 1.65; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--ink-light); }
    .empty-state h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; margin-bottom: 0.5rem; color: var(--ink); }

    /* RESPONSIVE */
    @media (max-width: 768px) { aside { display: none; } main { padding: 1.2rem; } .detail-body { grid-template-columns: 1fr; gap: 2rem; } .detail-title { font-size: 2rem; } header { padding: 0 1rem; } .header-brand { font-size: 1.2rem; } }
    @media (max-width: 480px) { .recipe-grid { grid-template-columns: 1fr; } }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .recipe-card { animation: fadeUp 0.3s ease both; }
    .recipe-card:nth-child(2) { animation-delay: 0.04s; }
    .recipe-card:nth-child(3) { animation-delay: 0.08s; }
    .recipe-card:nth-child(4) { animation-delay: 0.12s; }
    .recipe-card:nth-child(5) { animation-delay: 0.16s; }
    .recipe-card:nth-child(6) { animation-delay: 0.20s; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-brand" onclick="showList()" style="cursor:pointer">VinWin <span>Kitchen</span></div>
    <div class="search-wrap">
  <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="openSearch()"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="search" id="search-input" placeholder="Search recipes…" oninput="renderList()" />
</div>
<div class="search-overlay" id="search-overlay" onclick="closeSearchIfOutside(event)">
  <div class="search-overlay-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.4;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search-overlay-input" placeholder="Search recipes…" oninput="overlaySearch()" />
    <button class="search-cancel" onclick="closeSearch()">Cancel</button>
  </div>
</div>
  </header>

  <div class="layout">
    <aside id="sidebar">
      <div class="filter-label">Category</div>
      <div id="category-filters"></div>
      <div class="filter-label">Tags</div>
      <div id="tag-filters"></div>
    </aside>
    <main>
      <div id="list-view">
        <p class="results-info" id="results-info"></p>
        <div class="recipe-grid" id="recipe-grid"></div>
        <div class="empty-state" id="empty-state" style="display:none"><h3>Nothing found</h3><p>Try a different search or filter</p></div>
      </div>
      <div id="detail-view">
        <button class="back-btn" onclick="showList()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          All recipes
        </button>
        <div id="detail-content"></div>
      </div>
    </main>
  </div>
</div>

<script>
  const RECIPE_FILE = 'recipes.json';

  let recipes = [];
  let activeCategory = 'All';
  let activeTags = new Set();
  let currentServings = {};

  async function loadRecipes() {
    try {
      const res = await fetch(RECIPE_FILE + '?v=' + Date.now());
      recipes = await res.json();
      buildFilters();
      renderList();
    } catch(e) { console.error('Could not load recipes.json', e); }
  }

  function buildFilters() {
    const categories = ['All', ...new Set(recipes.map(r => r.category))];
    const tags = [...new Set(recipes.flatMap(r => r.tags))];
    document.getElementById('category-filters').innerHTML = categories.map(c =>
      `<button class="filter-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
    ).join('');
    document.getElementById('tag-filters').innerHTML = tags.map(t =>
      `<span class="tag-pill ${activeTags.has(t) ? 'active' : ''}" onclick="toggleTag('${t}')">${t}</span>`
    ).join('');
  }

  function setCategory(cat) { activeCategory = cat; buildFilters(); renderList(); }
  function toggleTag(tag) { activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag); buildFilters(); renderList(); }

  function getFiltered() {
    const q = (document.getElementById('search-input')?.value || '').toLowerCase();
    return recipes.filter(r => {
      if (activeCategory !== 'All' && r.category !== activeCategory) return false;
      if (activeTags.size > 0 && ![...activeTags].every(t => r.tags.includes(t))) return false;
      if (q && !r.title.toLowerCase().includes(q) && !r.description.toLowerCase().includes(q)
           && !r.category.toLowerCase().includes(q) && !r.tags.some(t => t.includes(q))) return false;
      return true;
    });
  }

  function renderList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    const filtered = getFiltered();
    const grid = document.getElementById('recipe-grid');
    const empty = document.getElementById('empty-state');
    const info = document.getElementById('results-info');
    info.textContent = filtered.length === recipes.length
      ? `${recipes.length} recipes` : `${filtered.length} of ${recipes.length} recipes`;
    if (filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(r => `
      <div class="recipe-card" onclick="showDetail('${r.id}')">
        <div class="card-category">${r.category}</div>
        <div class="card-title">${r.title}</div>
        <div class="card-desc">${r.description}</div>
        <div class="card-tags">${r.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
      </div>`).join('');
  }

  function showDetail(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    if (!currentServings[id]) currentServings[id] = r.servings;
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    renderDetail(r);
    window.scrollTo(0, 0);
  }

  function fmtAmt(amount, ratio) {
    const val = amount * ratio;
    if (val === 0) return '';
    if (val >= 10 || Number.isInteger(val)) return Math.round(val).toString();
    if (val < 1) {
      const fracs = [[1,8],[1,4],[1,3],[1,2],[2,3],[3,4]];
      let best = fracs[0], bestDiff = Infinity;
      fracs.forEach(f => { const d = Math.abs(val - f[0]/f[1]); if (d < bestDiff) { best = f; bestDiff = d; }});
      return `${best[0]}/${best[1]}`;
    }
    return parseFloat(val.toFixed(1)).toString();
  }

  // Build a lookup map of ingredient id -> scaled display string
  function buildIngMap(ingredients, ratio) {
    const map = {};
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);
    ingredients.forEach(ing => {
      const scaledAmt = fmtAmt(ing.amount, ratio);
      const showUnit = ing.unit && !countableUnits.has(ing.unit) && ing.unit !== 'pinch';
      const amtStr = showUnit ? `${scaledAmt}${ing.unit}` : scaledAmt;
      // For display in steps: "80g tahini" or "2 garlic cloves"
      const countableDisplay = ing.unit && countableUnits.has(ing.unit) ? `${scaledAmt} ${ing.name}` : `${amtStr} ${ing.name}`;
      map[ing.id] = `<span class="ing-inline">${countableDisplay}</span>`;
    });
    return map;
  }

  function resolveStepContent(content, ingMap) {
    return content.replace(/\{(i\d+)\}/g, (match, id) => ingMap[id] || match);
  }

  function renderDetail(r) {
    const srv = currentServings[r.id];
    const ratio = srv / r.servings;
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);

    const ingMap = buildIngMap(r.ingredients, ratio);

    const ingList = r.ingredients.map(ing => {
      const scaledAmt = fmtAmt(ing.amount, ratio);
      const showUnit = ing.unit && !countableUnits.has(ing.unit);
      const amtStr = showUnit ? `${scaledAmt} ${ing.unit}` : scaledAmt;
      return `<li><span class="ing-amount">${amtStr}</span><span class="ing-name">${ing.name}</span></li>`;
    }).join('');

    const stepList = r.steps.map((s, i) => `
      <li class="step-item" onclick="toggleStep(this)">
        <div class="step-num">${i + 1}</div>
        <div class="step-content">
          <h3>${s.title}</h3>
          <p>${resolveStepContent(s.content, ingMap)}</p>
        </div>
      </li>`).join('');

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-category">${r.category}</div>
      <h1 class="detail-title">${r.title}</h1>
      <p class="detail-desc">${r.description}</p>
      <div class="detail-meta">
        <div class="meta-item"><strong>Servings</strong></div>
        <div class="servings-ctrl">
          <button onclick="changeServings('${r.id}', -1)">−</button>
          <span id="srv-display">${srv}</span>
          <button onclick="changeServings('${r.id}', 1)">+</button>
        </div>
        <div class="meta-item"><strong>${r.ingredients.length}</strong> ingredients</div>
        <div class="meta-item"><strong>${r.steps.length}</strong> steps</div>
      </div>
      <div class="detail-body">
        <div class="ingredients-box">
          <h2>Ingredients</h2>
          <ul class="ingredients-list">${ingList}</ul>
        </div>
        <div class="steps-box">
          <h2>Method</h2>
          <ul class="steps-list">${stepList}</ul>
          ${r.notes ? `<div class="notes-box"><h3>Notes</h3><p>${r.notes}</p></div>` : ''}
        </div>
      </div>`;
  }

  function changeServings(id, delta) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    currentServings[id] = Math.max(1, (currentServings[id] || r.servings) + delta);
    renderDetail(r);
  }

  function toggleStep(el) { el.classList.toggle('done'); }
  function showList() { document.getElementById('detail-view').style.display = 'none'; document.getElementById('list-view').style.display = 'block'; }

function openSearch() {
  if (window.innerWidth <= 768) {
    document.getElementById('search-overlay').classList.add('active');
    setTimeout(() => document.getElementById('search-overlay-input').focus(), 50);
  }
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('active');
  document.getElementById('search-overlay-input').value = '';
  document.getElementById('search-input').value = '';
  renderList();
}
function closeSearchIfOutside(e) {
  if (e.target === document.getElementById('search-overlay')) closeSearch();
}
function overlaySearch() {
  document.getElementById('search-input').value = document.getElementById('search-overlay-input').value;
  renderList();
}
  
  loadRecipes();
</script>
</body>
</html>
