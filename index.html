<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="VinWin Kitchen — a personal recipe collection by Erwin & Vincent. Mostly vegan and vegetarian, always delicious." />
  <meta property="og:title" content="VinWin Kitchen" />
  <meta property="og:description" content="A personal recipe collection by Erwin & Vincent. Mostly vegan and vegetarian, always delicious." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.halderman.eu" />
  <meta property="og:image" content="https://www.halderman.eu/apple-touch-icon.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="VinWin Kitchen" />
  <meta name="twitter:description" content="A personal recipe collection by Erwin & Vincent. Mostly vegan and vegetarian, always delicious." />
  <meta name="twitter:image" content="https://www.halderman.eu/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFFFF5">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=2">
  <title>VinWin Kitchen</title>
  <!-- SPA routing: GitHub Pages redirects /recipe/:id via 404.html into sessionStorage,
       then this script restores the intended URL on load -->
  <script>
    (function() {
      var redirect = sessionStorage.getItem('vw-redirect');
      if (redirect) {
        sessionStorage.removeItem('vw-redirect');
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F8F8F2;
      --warm-white: #FFFFF5;
      --ink: #101030;
      --ink-light: #404060;
      --terracotta: #D4B800;
      --terracotta-light: #F0E890;
      --sage: #2A6B3A;
      --sage-light: #C8E0CC;
      --gold: #8B6914;
      --terracotta-text: #7A6800;
      --border: #D8D890;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }

    /* APP */
    #app { display: block; }

    /* HEADER */
    header {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
      height: 64px;
    }

    /* HEADER RIGHT */
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    /* CART BUTTON */
    .cart-btn {
      position: relative;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: var(--ink-light);
      flex-shrink: 0;
    }
    .cart-btn:hover { border-color: var(--terracotta-text); color: var(--terracotta-text); }
    .cart-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--sage);
      color: white;
      font-size: 0.6rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      border-radius: 10px;
      min-width: 16px;
      height: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      line-height: 1;
    }
    .cart-badge.visible { display: flex; }

    /* LANGUAGE SWITCHER — single flag + dropdown */
    .lang-switcher {
      position: relative;
      flex-shrink: 0;
    }
    .lang-current-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s, background 0.15s;
    }
    .lang-current-btn:hover { background: var(--cream); border-color: var(--terracotta-text); }
    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(16,16,48,0.1);
      overflow: hidden;
      z-index: 200;
      min-width: 44px;
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 38px;
      font-size: 1.15rem;
      cursor: pointer;
      transition: background 0.12s;
      border: none;
      background: none;
    }
    .lang-option:hover { background: var(--cream); }

    /* SEARCH */
    .search-wrap { flex: 1; max-width: 480px; position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 0.5rem 1rem 0.5rem 2.4rem;
      border: 1.5px solid var(--border);
      border-radius: 40px;
      background: var(--cream);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--terracotta-text); }
    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    /* SEARCH OVERLAY (mobile) */
    .search-overlay { display: none; }
    .search-overlay.active {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      z-index: 200;
      padding: 0;
      height: 64px;
      align-items: center;
    }
    .search-overlay-box {
      width: 100%;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      height: 100%;
    }
    .search-overlay-box input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 40px;
      background: var(--cream);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
    }
    .search-overlay-box input:focus { border-color: var(--terracotta-text); }
    .search-cancel {
      background: none;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      color: var(--ink-light);
      cursor: pointer;
      white-space: nowrap;
    }

    @media (min-width: 769px) { .search-overlay { display: none !important; } }
    @media (max-width: 768px) {
      .search-wrap input { display: none; }
      .search-icon { pointer-events: all; cursor: pointer; }
    }

    /* GROCERY DRAWER */
    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(16,16,48,0.3);
      z-index: 300;
      backdrop-filter: blur(2px);
    }
    .drawer-backdrop.open { display: block; }
    .grocery-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      max-width: 100vw;
      height: 100vh;
      background: var(--warm-white);
      border-left: 1px solid var(--border);
      z-index: 301;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -8px 0 32px rgba(16,16,48,0.1);
    }
    .grocery-drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 1.4rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
    }
    .drawer-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-light);
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .drawer-close:hover { color: var(--ink); }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.4rem;
    }
    .drawer-add-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.9rem 1.4rem;
      box-shadow: 0 -1px 0 var(--border);
      background: var(--warm-white);
      flex-shrink: 0;
    }
    .drawer-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-light);
      font-size: 0.88rem;
    }
    .drawer-empty-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
    .drawer-empty p { line-height: 1.5; }
    .drawer-add-row input {
      flex: 1;
      padding: 0.5rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }
    .drawer-add-row input:focus { border-color: var(--terracotta-text); }
    .drawer-add-row button {
      padding: 0.5rem 0.9rem;
      background: var(--terracotta);
      color: var(--ink);
      border: none;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .drawer-add-row button:hover { opacity: 0.85; }

    /* GROCERY ITEMS */
    .grocery-section-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin: 1rem 0 0.5rem;
    }
    .grocery-section-label:first-child { margin-top: 0; }
    .grocery-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .grocery-item.crossing {
      opacity: 0.35;
      transform: translateY(4px);
    }
    .grocery-item:last-child { border-bottom: none; }
    .grocery-item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--sage);
      flex-shrink: 0;
      pointer-events: none;
    }
    .grocery-item-text {
      flex: 1;
      color: var(--ink);
      line-height: 1.35;
    }
    .grocery-item.checked .grocery-item-text {
      text-decoration: line-through;
      color: var(--ink-light);
      opacity: 0.5;
    }
    .grocery-item-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-light);
      opacity: 0;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 0.85rem;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .grocery-item:hover .grocery-item-delete { opacity: 0.5; }
    .grocery-item-delete:hover { opacity: 1 !important; color: #c0392b; }
    @media (hover: none) {
      .grocery-item-delete { opacity: 0.35; }
    }

    /* DRAWER FOOTER */
    .drawer-footer {
      padding: 1rem 1.4rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .drawer-footer button {
      flex: 1;
      padding: 0.55rem 0.8rem;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn-clear-checked {
      background: var(--cream);
      border: 1.5px solid var(--border);
      color: var(--ink-light);
    }
    .btn-clear-checked:hover { background: var(--border); color: var(--ink); }
    .btn-clear-all {
      background: none;
      border: 1.5px solid #e0c0c0;
      color: #c0392b;
    }
    .btn-clear-all:hover { background: #fdf0f0; }
    .btn-undo {
      background: var(--cream);
      border: 1.5px solid var(--border);
      color: var(--ink-light);
    }
    .btn-undo:hover { background: var(--border); color: var(--ink); }

    /* ADD TO LIST button on recipe detail */
    .add-to-list-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .add-to-list-btn:hover { opacity: 0.85; }
    .add-to-list-btn svg { flex-shrink: 0; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--ink);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-family: 'Space Grotesk', sans-serif;
      z-index: 500;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* LAYOUT */
    .layout { display: block; min-height: calc(100vh - 64px); }

    /* MAIN */
    main { padding: 2rem; max-width: 960px; margin: 0 auto; }

    /* TOOLBAR */
    .list-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .toolbar-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
    }
    .toolbar-brand span { color: var(--terracotta); font-style: italic; }
    .results-info {
      font-size: 0.82rem;
      color: var(--ink-light);
      white-space: nowrap;
    }
    .toolbar-filters {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-left: auto;
    }

    /* FILTER DROPDOWNS */
    .filter-dropdown {
      position: relative;
    }
    .filter-dropdown-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.38rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      color: var(--ink-light);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .filter-dropdown-btn:hover { border-color: var(--ink-light); color: var(--ink); }
    .filter-dropdown-btn.active {
      background: var(--terracotta-light);
      border-color: var(--terracotta-text);
      color: var(--terracotta-text);
      font-weight: 500;
    }
    .filter-dropdown-btn svg { flex-shrink: 0; transition: transform 0.2s; }
    .filter-dropdown-btn[aria-expanded="true"] svg { transform: rotate(180deg); }
    .filter-dropdown-panel {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(16,16,48,0.10);
      z-index: 200;
      min-width: 180px;
      max-height: 320px;
      overflow-y: auto;
      padding: 0.4rem;
    }
    .filter-dropdown-panel.open { display: block; }
    .filter-option {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.45rem 0.65rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink-light);
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
    }
    .filter-option:hover { background: var(--cream); color: var(--ink); }
    .filter-option.selected { color: var(--ink); font-weight: 500; }
    .filter-option-check {
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s;
    }
    .filter-option.selected .filter-option-check {
      background: var(--sage);
      border-color: var(--sage);
    }
    .filter-option.selected .filter-option-check::after {
      content: '';
      width: 8px;
      height: 5px;
      border-left: 1.5px solid white;
      border-bottom: 1.5px solid white;
      transform: rotate(-45deg) translate(1px, -1px);
      display: block;
    }
    .clear-filters-btn {
      display: inline-flex;
      align-items: center;
      padding: 0.38rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-light);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .clear-filters-btn:hover { border-color: var(--ink-light); color: var(--ink); }

    /* GRID */
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.2rem; }
    .recipe-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.4rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .recipe-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(28,26,23,0.08);
      border-color: var(--terracotta-text);
    }
    .card-category { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--terracotta-text); margin-bottom: 0.5rem; }
    .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 0.5rem; }
    .card-desc { font-size: 0.83rem; color: var(--ink-light); line-height: 1.5; margin-bottom: 0.9rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .card-tag { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 20px; border: 1px solid var(--border); color: var(--ink-light); }

    /* DETAIL */
    #detail-view { display: none; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--ink-light);
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      padding: 0;
      margin-bottom: 2rem;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--terracotta-text); }
    .detail-category { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--terracotta-text); margin-bottom: 0.6rem; }
    .detail-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.8rem; font-weight: 600; line-height: 1.15; color: var(--ink); margin-bottom: 0.8rem; }
    .detail-desc { font-size: 1rem; color: var(--ink-light); font-style: italic; margin-bottom: 1.5rem; max-width: 560px; }
    .detail-meta { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .meta-item { font-size: 0.85rem; color: var(--ink-light); }
    .meta-item strong { color: var(--ink); }
    .servings-ctrl { display: flex; align-items: center; gap: 0.5rem; }
    .servings-ctrl button {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 400;
      color: var(--ink-light);
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
      padding: 0;
    }
    .servings-ctrl button:hover { border-color: var(--terracotta-text); color: var(--terracotta-text); }
    .servings-ctrl span { font-size: 0.9rem; font-weight: 500; min-width: 1.5rem; text-align: center; }
    .detail-body { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; align-items: start; }
    .ingredients-box h2, .steps-box h2 { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 1.2rem; }
    .ingredients-list { list-style: none; }
    .ingredients-list li { display: flex; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; line-height: 1.4; }
    .ingredients-list li:last-child { border-bottom: none; }
    .ing-amount { color: var(--terracotta-text); font-weight: 500; white-space: nowrap; min-width: 70px; flex-shrink: 0; }

  const _db = firebase.database();
  const _listRef = _db.ref('groceryList');


  // View count tracking
  const _viewsRef = _db.ref('recipeViews');
  window._viewCounts = {};
  _viewsRef.on('value', (snap) => { window._viewCounts = snap.val() || {}; });

  window._recordView = (id) => {
    const ref = _db.ref('recipeViews/' + id);
    ref.transaction(cur => (cur || 0) + 1);
  };

  // Listen for real-time changes
  _listRef.on('value', (snapshot) => {
    window._groceryItems = snapshot.val() || {};
    if (window.renderGroceryDrawer) window.renderGroceryDrawer();
  });

  // Grocery DB helpers — called directly, no bridging
  window._pushItem = (item) => _listRef.push(item);
  window._updateItem = (key, data) => _db.ref('groceryList/' + key).update(data);
  window._removeItem = (key) => _db.ref('groceryList/' + key).remove();
</script>

  function openDrawer() {

  // Undo stack — stores {key, text, checked} of last action
  window._undoStack = [];

  window.renderGroceryDrawer = function() {
    const items = window._groceryItems || {};
    const keys = Object.keys(items);
    const badge = document.getElementById('cart-badge');
    const uncheckedCount = keys.filter(k => !items[k].checked).length;

    // Badge
    badge.textContent = uncheckedCount;
    badge.classList.toggle('visible', uncheckedCount > 0);

    const container = document.getElementById('grocery-items');
    const empty = document.getElementById('drawer-empty');
    const footer = document.getElementById('drawer-footer');
    const undoBtn = document.getElementById('btn-undo');

    // Show undo button only when there's something to undo
    if (undoBtn) undoBtn.style.display = window._undoStack.length > 0 ? 'block' : 'none';

    if (keys.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      footer.style.display = window._undoStack.length > 0 ? 'flex' : 'none';
      return;
    }

    empty.style.display = 'none';
    footer.style.display = 'flex';

    // Sort: unchecked first, then checked; within each group keep insertion order
    const sorted = keys.sort((a, b) => {
      if (items[a].checked === items[b].checked) return 0;
      return items[a].checked ? 1 : -1;
    });

    container.innerHTML = sorted.map(key => {
      const item = items[key];
      return `
        <div class="grocery-item ${item.checked ? 'checked' : ''}" id="gi-${key}" onclick="toggleGroceryItem('${key}', ${!item.checked})">
          <input type="checkbox" ${item.checked ? 'checked' : ''} readonly />
          <span class="grocery-item-text">${escHtml(item.text)}</span>
          <button class="grocery-item-delete" onclick="event.stopPropagation();deleteGroceryItem('${key}')" title="Remove">✕</button>
        </div>`;
    }).join('');
  };

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addManualItem() {
    const input = document.getElementById('manual-item-input');
    const text = input.value.trim();
    if (!text || !window._pushItem) return;
    window._pushItem({ text, checked: false, ts: Date.now() });
    input.value = '';
  }

  window.toggleGroceryItem = function(key, checked) {
    if (!window._updateItem) return;
    const item = (window._groceryItems || {})[key];
    if (item) window._undoStack.push({ type: 'toggle', key, checked: !checked, text: item.text });

    // Animate the crossing before Firebase re-renders
    if (checked) {
      const el = document.getElementById('gi-' + key);
      if (el) {
        el.classList.add('crossing');
        setTimeout(() => window._updateItem(key, { checked }), 380);
      } else {
        window._updateItem(key, { checked });
      }
    } else {
      window._updateItem(key, { checked });
    }

    const undoBtn = document.getElementById('btn-undo');
    if (undoBtn) undoBtn.style.display = 'block';
    const footer = document.getElementById('drawer-footer');
    if (footer) footer.style.display = 'flex';
  };

  window.deleteGroceryItem = function(key) {
    if (!window._removeItem) return;
    const item = (window._groceryItems || {})[key];
    if (item) window._undoStack.push({ type: 'delete', key, text: item.text, checked: item.checked });
    window._removeItem(key);
    const undoBtn = document.getElementById('btn-undo');
    if (undoBtn) undoBtn.style.display = 'block';
    const footer = document.getElementById('drawer-footer');
    if (footer) footer.style.display = 'flex';
  };

  function undoLast() {
    const action = window._undoStack.pop();
    if (!action) return;
    if (action.type === 'toggle') {
      window._updateItem(action.key, { checked: action.checked });
    } else if (action.type === 'delete') {
      window._pushItem({ text: action.text, checked: action.checked, ts: Date.now() });
    } else if (action.type === 'clearChecked') {
      action.items.forEach(i => window._pushItem({ text: i.text, checked: false, ts: Date.now() }));
    } else if (action.type === 'clearAll') {
      action.items.forEach(i => window._pushItem({ text: i.text, checked: i.checked, ts: Date.now() }));
    }
    if (window._undoStack.length === 0) {
      const undoBtn = document.getElementById('btn-undo');
      if (undoBtn) undoBtn.style.display = 'none';
    }
  }

  function clearChecked() {
    const items = window._groceryItems || {};
    const toDelete = Object.keys(items).filter(k => items[k].checked).map(k => ({ key: k, ...items[k] }));
    if (toDelete.length === 0) return;
    window._undoStack.push({ type: 'clearChecked', items: toDelete });
    toDelete.forEach(i => window._removeItem(i.key));
  }

  function clearAll() {
    const items = window._groceryItems || {};
    const all = Object.keys(items).map(k => ({ key: k, ...items[k] }));
    if (all.length === 0) return;
    window._undoStack.push({ type: 'clearAll', items: all });
    all.forEach(i => window._removeItem(i.key));
  }

  // Ingredients to always skip when adding to grocery list
  const GROCERY_SKIP = new Set(['water', 'salt', 'pepper', 'water', 'zout', 'peper', 'agua', 'sal', 'pimienta']);

  function ingredientSkipped(name) {
    const n = name.toLowerCase().trim();
    // Skip if the name starts with or exactly matches a skip word
    return [...GROCERY_SKIP].some(w => n === w || n.startsWith(w + ',') || n.startsWith(w + ' '));
  }

  // Normalise an ingredient name to a simple key for matching
  // Strips descriptors like "fresh", "minced", "drained" etc. and lowercases
  function normKey(name) {
    return name.toLowerCase()
      .replace(/,.*$/, '')           // strip everything after first comma
      .replace(/\(.*?\)/g, '')       // strip parentheticals
      .replace(/\b(fresh|dried|frozen|thawed|drained|rinsed|minced|chopped|sliced|grated|ground|toasted|large|medium|small|finely|roughly|coarsely|lightly)\b/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function addRecipeToList(recipeId) {
    const r = recipes.find(x => x.id === recipeId);
    if (!r || !window._pushItem) return;
    const isAeropress = recipeId === 'aeropress-hoffmann' || recipeId === 'aeropress-bypass';
    const baseGrams = recipeId === 'aeropress-bypass' ? 20 : 11;
    const ratio = isAeropress
      ? (coffeeGrams[recipeId] !== undefined ? coffeeGrams[recipeId] / baseGrams : 1)
      : (currentServings[recipeId] || r.servings) / r.servings;
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);

    // Build list of {name, amount, unit} to add, combining duplicates within the recipe
    const toAdd = [];
    r.ingredients.forEach(ing => {
      const name = loc(ing.name);
      if (ingredientSkipped(name)) return;
      const scaledAmt = ing.amount * ratio;
      const unit = ing.unit || '';
      const key = normKey(name) + '|' + unit;
      const existing = toAdd.find(x => x.key === key);
      if (existing) {
        existing.amount += scaledAmt;
      } else {
        toAdd.push({ key, name, amount: scaledAmt, unit });
      }
    });

    // Now match against existing grocery items and combine or add
    const existingItems = window._groceryItems || {};
    let added = 0;
    let combined = 0;

    toAdd.forEach(({ name, amount, unit }) => {
      const showUnit = unit && !countableUnits.has(unit);
      // Try to find a matching existing item
      const matchKey = normKey(name) + '|' + unit;
      const existingKey = Object.keys(existingItems).find(k => {
        const itemText = existingItems[k].text;
        // Extract name from item text (strip leading amount)
        const itemName = itemText.replace(/^[\d./\s]+(g|ml|kg|l|tsp|tbsp|cup|clove[s]?)?\s*/i, '');
        return normKey(itemName) + '|' + unit === matchKey;
      });

      if (existingKey) {
        // Parse the existing amount and add to it
        const existingText = existingItems[existingKey].text;
        const numMatch = existingText.match(/^([\d.]+)/);
        const existingAmt = numMatch ? parseFloat(numMatch[1]) : 0;
        const newAmt = existingAmt + amount;
        const fmtNew = newAmt >= 10 || Number.isInteger(newAmt) ? Math.round(newAmt) : parseFloat(newAmt.toFixed(1));
        const newText = showUnit ? `${fmtNew} ${unit} ${name}` : `${fmtNew} ${name}`;
        window._updateItem(existingKey, { text: newText.trim() });
        combined++;
      } else {
        const fmtAmt = amount >= 10 || Number.isInteger(amount) ? Math.round(amount) : parseFloat(amount.toFixed(1));
        const text = showUnit ? `${fmtAmt} ${unit} ${name}` : `${fmtAmt} ${name}`;
        window._pushItem({ text: text.trim(), checked: false, ts: Date.now() });
        added++;
      }
    });

    const total = added + combined;
    const msg = combined > 0
      ? t('addedToast')(added) + (combined > 0 ? ` (${combined} combined)` : '')
      : t('addedToast')(total);
    showToast(msg);
    openDrawer();
  }

  let _toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // ── RECIPES ────────────────────────────────────────────────────

  async function loadRecipes() {
    // Show skeleton cards while loading
    const grid = document.getElementById('recipe-grid');
    grid.innerHTML = Array(6).fill(0).map(() => `
      <div class="skeleton-card">
        <div class="skeleton skeleton-line" style="width:40%;margin-bottom:0.8rem"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-line" style="width:100%"></div>
        <div class="skeleton skeleton-line" style="width:85%"></div>
        <div class="skeleton skeleton-line" style="width:60%;margin-bottom:0.9rem"></div>
        <div><span class="skeleton skeleton-tag"></span><span class="skeleton skeleton-tag"></span></div>
      </div>`).join('');
    try {
      // Use Last-Modified header as cache key — auto-updates when recipes.json changes,
      // but doesn't bypass cache on every load like Date.now() does
      let url = RECIPE_FILE;
      try {
        const head = await fetch(RECIPE_FILE, { method: 'HEAD' });
        const lm = head.headers.get('last-modified');
        if (lm) url = RECIPE_FILE + '?v=' + encodeURIComponent(lm);
      } catch(_) {}
      const res = await fetch(url);
      recipes = await res.json();
      buildFilters();
      renderList();
      // Deep-link: if URL is /recipe/:id, open that recipe directly
      const pathMatch = location.pathname.match(/^\/recipe\/([^/]+)$/);
      if (pathMatch) {
        const recipeId = pathMatch[1];
        if (recipes.find(x => x.id === recipeId)) {
          showDetail(recipeId);
        }
      } else if (location.hash) {
        // Legacy hash support
        const hash = location.hash.replace('#', '');
        if (hash && recipes.find(x => x.id === hash)) {
          showDetail(hash);
        }
      }
    } catch(e) {
      console.error('Could not load recipes.json', e);
      grid.innerHTML = '<p style="color:var(--ink-light);padding:2rem">Could not load recipes.</p>';
    }
  }

  function buildFilters() {
    const allLabel = t('all');
    // Merge Desserts into Baking for display
    const rawCategories = [...new Set(recipes.map(r => loc(r.category)))];
    const categories = rawCategories.filter(c => c !== loc({en:'Desserts',nl:'Desserts',es:'Postres'}));
    const tags = [...new Set(recipes.flatMap(r => r.tags))];
    const hasActiveFilter = activeCategory !== 'All' || activeTags.size > 0;

    // Category options (no "All" option — deselecting all = All)
    const catOptionsEl = document.getElementById('cat-options');
    if (catOptionsEl) {
      catOptionsEl.innerHTML = categories.map(c => {
        const sel = (loc(recipes.find(r => loc(r.category) === c)?.category) === activeCategory || c === activeCategory);
        return `<div class="filter-option ${sel ? 'selected' : ''}" onclick="toggleCategory('${c.replace(/'/g,"\'")}')" role="option" aria-selected="${sel}">
          <span class="filter-option-check"></span>${c}
        </div>`;
      }).join('');
    }

    // Tag options
    const tagOptionsEl = document.getElementById('tag-options');
    if (tagOptionsEl) {
      tagOptionsEl.innerHTML = tags.map(tg => {
        const sel = activeTags.has(tg);
        return `<div class="filter-option ${sel ? 'selected' : ''}" onclick="toggleTag('${tg}')" role="option" aria-selected="${sel}">
          <span class="filter-option-check"></span>${tg}
        </div>`;
      }).join('');
    }

    // Update category button label
    const catBtn = document.getElementById('cat-dropdown-btn');
    const catLabel = document.getElementById('cat-dropdown-label');
    if (catBtn && catLabel) {
      const activeCats = activeCategory === 'All' ? [] : [activeCategory];
      catLabel.textContent = activeCats.length ? activeCats[0] : t('category');
      catBtn.classList.toggle('active', activeCats.length > 0);
      catBtn.setAttribute('aria-expanded', document.getElementById('cat-dropdown-panel')?.classList.contains('open') ? 'true' : 'false');
    }

    // Update tag button label
    const tagBtn = document.getElementById('tag-dropdown-btn');
    const tagLabel = document.getElementById('tag-dropdown-label');
    if (tagBtn && tagLabel) {
      tagLabel.textContent = activeTags.size ? (activeTags.size === 1 ? [...activeTags][0] : activeTags.size + ' tags') : t('tags');
      tagBtn.classList.toggle('active', activeTags.size > 0);
      tagBtn.setAttribute('aria-expanded', document.getElementById('tag-dropdown-panel')?.classList.contains('open') ? 'true' : 'false');
    }

    // Show/hide clear button
    const clearBtn = document.getElementById('clear-filters-btn');
    if (clearBtn) clearBtn.style.display = hasActiveFilter ? 'inline-flex' : 'none';
  }


  function clearAllFilters() {
    activeCategory = 'All';
    activeTags.clear();
    buildFilters();
    renderList();
  }

  function toggleCategory(cat) {
    // Clicking the already-active category deselects it (back to All)
    if (activeCategory === cat) {
      activeCategory = 'All';
    } else {
      activeCategory = cat;
    }
    buildFilters();
    renderList();
  }

  // Keep setCategory as alias for any remaining references
  function setCategory(cat) {
    activeCategory = cat === t('all') ? 'All' : cat;
    buildFilters();
    renderList();

  function toggleDropdown(which) {

    document.querySelectorAll('.filter-dropdown-btn').forEach(b => b.setAttribute('aria-expanded', 'false'));

  function toggleTag(tag) {
    activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
    buildFilters();
    renderList();
  }

  function getFiltered() {
    const q = (document.getElementById('search-input')?.value || '').toLowerCase();
    return recipes.filter(r => {
      const bakingAliases = { en: ['Baking','Desserts'], nl: ['Bakken','Desserts'], es: ['Horneados','Postres'] };
      const isBakingActive = activeCategory === 'Baking' || activeCategory === 'Bakken' || activeCategory === 'Horneados';
      const catLocalized = loc(r.category);
      const catMatch = activeCategory === 'All'
        || catLocalized === activeCategory
        || r.category === activeCategory
        || (isBakingActive && (bakingAliases.en.includes(catLocalized) || bakingAliases.nl.includes(catLocalized) || bakingAliases.es.includes(catLocalized)));
      if (!catMatch) return false;
      if (activeTags.size > 0 && ![...activeTags].every(tag => r.tags.includes(tag))) return false;
      if (q) {
        const title = loc(r.title).toLowerCase();
        const desc = loc(r.description).toLowerCase();
        const cat = loc(r.category).toLowerCase();
        const tags = r.tags.join(' ').toLowerCase();
        const ingredients = r.ingredients.map(i => loc(i.name)).join(' ').toLowerCase();
        const steps = r.steps.map(s => loc(s.content) + ' ' + loc(s.title)).join(' ').toLowerCase();
        const notes = loc(r.notes || '').toLowerCase();
        if (!title.includes(q) && !desc.includes(q) && !cat.includes(q) && !tags.includes(q) && !ingredients.includes(q) && !steps.includes(q) && !notes.includes(q)) return false;
      }
      return true;
    });
  }

  function renderList() {
    const filtered = getFiltered();
    const grid = document.getElementById('recipe-grid');
    const empty = document.getElementById('empty-state');
    const info = document.getElementById('results-info');

    info.textContent = filtered.length === recipes.length
      ? t('resultsAll')(recipes.length)
      : t('resultsFiltered')(filtered.length, recipes.length);

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(r => {
      const rc = RECIPE_COLORS[r.id] || { color: '#2A6B3A' };
      return `
      <div class="recipe-card" onclick="showDetail('${r.id}')" style="border-top:3px solid ${rc.color}">
        <div class="card-category">${loc(r.category)}</div>
        <div class="card-title">${loc(r.title)}</div>
        <div class="card-desc">${loc(r.description)}</div>
        <div class="card-tags">${r.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}</div>
      </div>`;
    }).join('');
  }

  function fmtAmt(amount, ratio) {
    const val = amount * ratio;
    if (val === 0) return '';
    if (val >= 10 || Number.isInteger(val)) return Math.round(val).toString();
    if (val < 1) {
      const fracs = [[1,8],[1,4],[1,3],[1,2],[2,3],[3,4]];
      let best = fracs[0], bestDiff = Infinity;
      fracs.forEach(f => { const d = Math.abs(val - f[0]/f[1]); if (d < bestDiff) { best = f; bestDiff = d; }});
      return `${best[0]}/${best[1]}`;
    }
    return parseFloat(val.toFixed(1)).toString();
  }

  function buildIngMap(ingredients, ratio) {
    const map = {};
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);
    ingredients.forEach(ing => {
      const scaledAmt = fmtAmt(ing.amount, ratio);
      const showUnit = ing.unit && !countableUnits.has(ing.unit);
      const amtStr = showUnit ? `${scaledAmt}${ing.unit}` : scaledAmt;
      const name = loc(ing.name);
      const display = (ing.unit && countableUnits.has(ing.unit)) ? `${scaledAmt} ${name}` : `${amtStr} ${name}`;
      map[ing.id] = `<span class="ing-inline">${display}</span>`;
    });
    return map;
  }

  function resolveStepContent(content, ingMap) {
    return content.replace(/\{(i\d+)\}/g, (match, id) => ingMap[id] || match);
  }

  function renderDetail(r) {
    const srv = currentServings[r.id];
    // For Aeropress: ratio is driven by coffeeGrams, not servings
    const isAeropress = r.id === 'aeropress-hoffmann' || r.id === 'aeropress-bypass';
    const baseGrams = r.id === 'aeropress-bypass' ? 20 : 11;
    if (isAeropress && coffeeGrams[r.id] === undefined) {
      coffeeGrams[r.id] = r.id === 'aeropress-bypass' ? getBypassGrams() : baseGrams;
    }
    const ratio = isAeropress ? (coffeeGrams[r.id] / baseGrams) : (srv / r.servings);
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);
    const ingMap = buildIngMap(r.ingredients, ratio);

    const renderIng = (ing, isOptional) => {
      const scaledAmt = fmtAmt(ing.amount, ratio);
      const showUnit = ing.unit && !countableUnits.has(ing.unit);
      const amtStr = showUnit ? `${scaledAmt} ${ing.unit}` : scaledAmt;
      return `<li class="${isOptional ? 'ing-optional' : ''}"><span class="ing-amount">${amtStr}</span><span class="ing-name">${loc(ing.name)}</span></li>`;
    };
    const optionalLabel = { en: 'Optional', nl: 'Optioneel', es: 'Opcional' };

    let ingList;
    if (r.groups && r.groups.length) {
      // Grouped layout: render each group with a subheader
      const ingById = Object.fromEntries(r.ingredients.map(i => [i.id, i]));
      const groupedIds = new Set(r.groups.flatMap(g => g.ids));
      const ungrouped = r.ingredients.filter(i => !groupedIds.has(i.id));
      const rows = [];
      r.groups.forEach(g => {
        rows.push(`<li class="ing-group-header">${loc(g.label)}</li>`);
        g.ids.forEach(id => {
          const ing = ingById[id];
          if (ing) rows.push(renderIng(ing, !!ing.optional));
        });
      });
      if (ungrouped.length) {
        ungrouped.forEach(ing => rows.push(renderIng(ing, !!ing.optional)));
      }
      ingList = rows.join('');
    } else {
      // Flat layout (existing behaviour)
      const requiredIngs = r.ingredients.filter(ing => !ing.optional);
      const optionalIngs = r.ingredients.filter(ing => ing.optional);
      ingList = [
        ...requiredIngs.map(ing => renderIng(ing, false)),
        ...(optionalIngs.length ? [`<li class="ing-optional-header">${optionalLabel[lang] || 'Optional'}</li>`, ...optionalIngs.map(ing => renderIng(ing, true))] : [])
      ].join('');
    }

    const optionalStepLabel = { en: 'optional', nl: 'optioneel', es: 'opcional' };
    const stepList = r.steps.map((s, i) => `
      <li class="step-item${s.optional ? ' optional' : ''}">
        <div class="step-num">${i + 1}</div>
        <div class="step-content">
          <h3>${loc(s.title)}${s.optional ? ` <em class="step-optional-label">— ${optionalStepLabel[lang] || 'optional'}</em>` : ''}</h3>
          <p>${resolveStepContent(loc(s.content), ingMap)}</p>
        </div>
      </li>`).join('');

    const notes = loc(r.notes);

    document.getElementById('detail-content').innerHTML = `
      <div class="cook-focus-bar">
        <span class="cook-focus-recipe-name">${loc(r.title)}</span>
        <button class="cook-focus-exit" onclick="toggleCookFocus()">✕ Exit focus</button>
      </div>
      <div class="detail-category">${loc(r.category)}</div>
      <h1 class="detail-title">${loc(r.title)}</h1>
      <p class="detail-desc">${loc(r.description)}</p>
      <div class="detail-meta">
        ${isAeropress ? `
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:nowrap">
          <div class="meta-item"><strong>Coffee</strong></div>
          <div class="servings-ctrl">
            <button onclick="changeCoffeeGrams('${r.id}', -1)">−</button>
            <span id="grams-display">${coffeeGrams[r.id]}g</span>
            <button onclick="changeCoffeeGrams('${r.id}', 1)">+</button>
          </div>
        </div>
        ` + (r.id === 'aeropress-bypass' ? `
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:nowrap">
          <div class="meta-item"><strong>Yield</strong></div>
          <div class="servings-ctrl">
            <button onclick="changeBypassYield('aeropress-bypass', -50)">−</button>
            <span>${bypassYield} ml</span>
            <button onclick="changeBypassYield('aeropress-bypass', 50)">+</button>
          </div>
        </div>
        <button onclick="resetBypass('aeropress-bypass')" style="font-size:0.75rem;padding:0.25rem 0.7rem;border-radius:20px;border:1.5px solid var(--sage);color:var(--sage);background:none;cursor:pointer;font-family:inherit;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='var(--sage)';this.style.color='var(--warm-white)'" onmouseout="this.style.background='none';this.style.color='var(--sage)'">↺ Reset</button>
        ` : '') + `
        ` : `
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:nowrap">
          <div class="meta-item"><strong>${t('servings')}</strong></div>
          <div class="servings-ctrl">
            <button onclick="changeServings('${r.id}', -1)">−</button>
            <span id="srv-display">${srv}</span>
            <button onclick="changeServings('${r.id}', 1)">+</button>
          </div>
        </div>`}
        <button class="cook-mode-btn" id="cook-mode-btn" onclick="toggleCookFocus()" aria-label="Toggle focus mode">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            Cook
          </button>
        <button class="share-btn" data-recipe-id="${r.id}"  data-recipe-title="${loc(r.title).replace(/"/g, '&quot;')}" onclick="shareRecipe(this.dataset.recipeId, this.dataset.recipeTitle)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          ${t('shareLabel')}
        </button>
      </div>
      <div class="detail-body">
        <div class="ingredients-box">
          <h2>${t('ingredientsLabel')}</h2>
          <ul class="ingredients-list">${ingList}</ul>
          <button class="add-to-list-btn" onclick="addRecipeToList('${r.id}')" style="margin-top:1.2rem">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            ${t('addToList')}
          </button>
        </div>
        <div class="steps-box">
          <h2>${t('methodLabel')}</h2>
          <ul class="steps-list">${stepList}</ul>
          ${notes ? `<div class="notes-box"><h3>${t('notesLabel')}</h3><p>${notes}</p></div>` : ''}
        </div>
      </div>`;
  }

  function changeServings(id, delta) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    currentServings[id] = Math.max(1, (currentServings[id] || r.servings) + delta);
    sessionStorage.setItem('vw-servings', JSON.stringify(currentServings));
    renderDetail(r);
  }

  function changeCoffeeGrams(id, delta) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    const baseGrams = id === 'aeropress-bypass' ? 20 : 11;
    if (coffeeGrams[id] === undefined) coffeeGrams[id] = baseGrams;
    coffeeGrams[id] = Math.max(id === 'aeropress-bypass' ? 10 : 5, coffeeGrams[id] + delta);
    if (id === 'aeropress-bypass') {
      bypassYield = Math.round((coffeeGrams[id] / 20) * 400);
      sessionStorage.setItem('vw-bypass-yield', bypassYield);
    }
    sessionStorage.setItem('vw-coffee', JSON.stringify(coffeeGrams));
    renderDetail(r);
  }

  // bypassYield stores the canonical yield in ml; coffeeGrams is derived from it for bypass
  let bypassYield = parseInt(sessionStorage.getItem('vw-bypass-yield') || '400');

  function getBypassYield() { return bypassYield; }
  function getBypassGrams() { return Math.max(10, Math.round((bypassYield / 400) * 20)); }

  function changeBypassYield(id, delta) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    bypassYield = Math.max(200, bypassYield + delta);
    coffeeGrams[id] = getBypassGrams();
    sessionStorage.setItem('vw-bypass-yield', bypassYield);
    sessionStorage.setItem('vw-coffee', JSON.stringify(coffeeGrams));
    renderDetail(r);
  }

  function resetBypass(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    bypassYield = 400;
    coffeeGrams[id] = 20;
    sessionStorage.setItem('vw-bypass-yield', bypassYield);
    sessionStorage.setItem('vw-coffee', JSON.stringify(coffeeGrams));
    renderDetail(r);
  }

  // ── NAVIGATION WITH HISTORY ────────────────────────────────────
  // Use pushState so browser back (swipe, button, keyboard) always works
  function showDetail(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    window._currentRecipeId = id;
    if (!currentServings[id]) currentServings[id] = r.servings;
    // Clear search and close mobile overlay when navigating to a recipe
    document.getElementById('search-input').value = '';
    document.getElementById('search-overlay-input').value = '';
    document.getElementById('search-overlay').classList.remove('active');
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    renderDetail(r);
    updateOGMeta(r);
    recordView(r.id);
    window.scrollTo(0, 0);
    // Push a state so browser back returns to list; use clean URL path
    history.pushState({ recipeId: id }, '', '/recipe/' + id);
  }

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    window._currentRecipeId = null;
    history.replaceState({}, '', '/');
    resetOGMeta();
  }

  function shareRecipe(id, title) {
    const url = `${location.origin}/recipe/${id}`;
    if (navigator.share) {
      navigator.share({ title: title + ' — VinWin Kitchen', url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => showToast(t('shareCopied'))).catch(() => {
        // Fallback: select a temp input
        const el = document.createElement('input');
        el.value = url; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);
        showToast(t('shareCopied'));
      });
    }
  }

  // Handle browser back (includes swipe-back on Mac Safari, iOS home screen, keyboard)
  window.addEventListener('popstate', (e) => {
    const detailVisible = document.getElementById('detail-view').style.display !== 'none';
    if (detailVisible) {
      showList();
    }
  });

  // Touch swipe as fallback for edge cases (e.g. first page load with no history)
  (function() {
    let touchStartX = 0;
    let touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
      const detailVisible = document.getElementById('detail-view').style.display !== 'none';
      if (detailVisible && touchStartX < 60 && dx > 80 && dy < 80) {
        history.back();
      }
    }, { passive: true });
  })();

  function onSearchInput() {
    const detailVisible = document.getElementById('detail-view').style.display !== 'none';
    if (detailVisible) {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
      window._currentRecipeId = null;
    }
    renderList();
  }

  function openSearch() {
    if (window.innerWidth <= 768) {
      document.getElementById('search-overlay').classList.add('active');
      document.getElementById('search-overlay-input').focus();
    }
  }
  function closeSearch() {
    document.getElementById('search-overlay').classList.remove('active');
    document.getElementById('search-overlay-input').value = '';
    document.getElementById('search-input').value = '';
    renderList();
  }
  function closeSearchIfOutside(e) {
    if (e.target === document.getElementById('search-overlay')) closeSearch();
  }
  function overlaySearch() {
    const val = document.getElementById('search-overlay-input').value;
    document.getElementById('search-input').value = val;
    // If on detail view, navigate back to list first
    const detailVisible = document.getElementById('detail-view').style.display !== 'none';
    if (detailVisible) {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
      window._currentRecipeId = null;
    }
    renderList();
  }



  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    // Focus mode: Escape exits
    if (document.getElementById('detail-view').classList.contains('cook-focus')) {
      if (e.key === 'Escape') { toggleCookFocus(); return; }
    }
    if (e.key !== 'Escape') return;
    if (document.getElementById('search-overlay').classList.contains('active')) { closeSearch(); return; }
    if (document.querySelector('.filter-dropdown-panel.open')) { closeAllDropdowns(); return; }
    if (document.getElementById('grocery-drawer').classList.contains('open')) { closeDrawer(); return; }
    if (document.getElementById('detail-view').style.display !== 'none') { history.back(); return; }
  });





  // ── COOK FOCUS MODE ────────────────────────────────────────────
  let _wakeLock = null;

  async function toggleCookFocus() {
    const detail = document.getElementById('detail-view');
    const btn = document.getElementById('cook-mode-btn');
    const active = detail.classList.toggle('cook-focus');
    if (btn) btn.classList.toggle('active', active);
    if (active) {
      window.scrollTo(0, 0);
      if ('wakeLock' in navigator) {
        try { _wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
      }
    } else {
      if (_wakeLock) { _wakeLock.release(); _wakeLock = null; }
    }
  }

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && _wakeLock === null) {
      const detail = document.getElementById('detail-view');
      if (detail && detail.classList.contains('cook-focus') && 'wakeLock' in navigator) {
        try { _wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
      }
    }
  });


  function recordView(id) {
    if (window._recordView) window._recordView(id);
  }

  function updateOGMeta(r) {
    const rc = RECIPE_COLORS[r.id] || { color: '#2A6B3A', name: '' };
    const title = loc(r.title) + ' — VinWin Kitchen';
    const desc = loc(r.description);
    const ogImg = 'https://www.halderman.eu/og/' + r.id + '.png';
    document.querySelector('meta[property="og:title"]').setAttribute('content', title);
    document.querySelector('meta[property="og:description"]').setAttribute('content', desc);
    document.querySelector('meta[property="og:image"]').setAttribute('content', ogImg);
    document.querySelector('meta[name="twitter:title"]').setAttribute('content', title);
    document.querySelector('meta[name="twitter:description"]').setAttribute('content', desc);
    document.querySelector('meta[name="twitter:image"]').setAttribute('content', ogImg);
  }

  function resetOGMeta() {
    document.querySelector('meta[property="og:title"]').setAttribute('content', 'VinWin Kitchen');
    document.querySelector('meta[property="og:description"]').setAttribute('content', 'A personal recipe collection by Erwin & Vincent. Mostly vegan and vegetarian, always delicious.');
    document.querySelector('meta[property="og:image"]').setAttribute('content', 'https://www.halderman.eu/apple-touch-icon.png');
    document.querySelector('meta[name="twitter:title"]').setAttribute('content', 'VinWin Kitchen');
    document.querySelector('meta[name="twitter:description"]').setAttribute('content', 'A personal recipe collection by Erwin & Vincent. Mostly vegan and vegetarian, always delicious.');
    document.querySelector('meta[name="twitter:image"]').setAttribute('content', 'https://www.halderman.eu/apple-touch-icon.png');
  }

  loadRecipes();
</script>
</body>
</html>
