<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=2">
  <title>VinWin Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F8F8F2;
      --warm-white: #FFFFF5;
      --ink: #101030;
      --ink-light: #404060;
      --terracotta: #D4B800;
      --terracotta-light: #F0E890;
      --sage: #2A6B3A;
      --sage-light: #C8E0CC;
      --gold: #2A6B3A;
      --border: #D8D890;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }

    /* APP */
    #app { display: block; }

    /* HEADER */
    header {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      height: 64px;
    }
    .header-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
    }
    .header-brand span { color: var(--terracotta); font-style: italic; }

    /* HEADER RIGHT */
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    /* CART BUTTON */
    .cart-btn {
      position: relative;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: var(--ink-light);
      flex-shrink: 0;
    }
    .cart-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
    .cart-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--sage);
      color: white;
      font-size: 0.6rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      border-radius: 10px;
      min-width: 16px;
      height: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      line-height: 1;
    }
    .cart-badge.visible { display: flex; }

    /* LANGUAGE SWITCHER — single flag + dropdown */
    .lang-switcher {
      position: relative;
      flex-shrink: 0;
    }
    .lang-current-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s, background 0.15s;
    }
    .lang-current-btn:hover { background: var(--cream); border-color: var(--terracotta); }
    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(16,16,48,0.1);
      overflow: hidden;
      z-index: 200;
      min-width: 44px;
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 38px;
      font-size: 1.15rem;
      cursor: pointer;
      transition: background 0.12s;
      border: none;
      background: none;
    }
    .lang-option:hover { background: var(--cream); }

    /* SEARCH */
    .search-wrap { flex: 1; max-width: 360px; position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 0.5rem 1rem 0.5rem 2.4rem;
      border: 1.5px solid var(--border);
      border-radius: 40px;
      background: var(--cream);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--terracotta); }
    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    /* SEARCH OVERLAY (mobile) */
    .search-overlay { display: none; }
    .search-overlay.active {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      z-index: 200;
      padding: 0;
      height: 64px;
      align-items: center;
    }
    .search-overlay-box {
      width: 100%;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      height: 100%;
    }
    .search-overlay-box input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 40px;
      background: var(--cream);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
    }
    .search-overlay-box input:focus { border-color: var(--terracotta); }
    .search-cancel {
      background: none;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      color: var(--ink-light);
      cursor: pointer;
      white-space: nowrap;
    }

    @media (min-width: 769px) { .search-overlay { display: none !important; } }
    @media (max-width: 768px) {
      .search-wrap input { display: none; }
      .search-icon { pointer-events: all; cursor: pointer; }
    }

    /* GROCERY DRAWER */
    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(16,16,48,0.3);
      z-index: 300;
      backdrop-filter: blur(2px);
    }
    .drawer-backdrop.open { display: block; }
    .grocery-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      max-width: 100vw;
      height: 100vh;
      background: var(--warm-white);
      border-left: 1px solid var(--border);
      z-index: 301;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -8px 0 32px rgba(16,16,48,0.1);
    }
    .grocery-drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 1.4rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
    }
    .drawer-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-light);
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .drawer-close:hover { color: var(--ink); }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.4rem;
    }
    .drawer-add-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.9rem 1.4rem;
      border-top: 1px solid var(--border);
      background: var(--warm-white);
      flex-shrink: 0;
    }
    .drawer-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-light);
      font-size: 0.88rem;
    }
    .drawer-empty-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
    .drawer-empty p { line-height: 1.5; }
    .drawer-add-row input {
      flex: 1;
      padding: 0.5rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }
    .drawer-add-row input:focus { border-color: var(--terracotta); }
    .drawer-add-row button {
      padding: 0.5rem 0.9rem;
      background: var(--terracotta);
      color: var(--ink);
      border: none;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .drawer-add-row button:hover { opacity: 0.85; }

    /* GROCERY ITEMS */
    .grocery-section-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin: 1rem 0 0.5rem;
    }
    .grocery-section-label:first-child { margin-top: 0; }
    .grocery-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .grocery-item.crossing {
      opacity: 0.35;
      transform: translateY(4px);
    }
    .grocery-item:last-child { border-bottom: none; }
    .grocery-item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--sage);
      flex-shrink: 0;
      pointer-events: none;
    }
    .grocery-item-text {
      flex: 1;
      color: var(--ink);
      line-height: 1.35;
    }
    .grocery-item.checked .grocery-item-text {
      text-decoration: line-through;
      color: var(--ink-light);
      opacity: 0.5;
    }
    .grocery-item-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-light);
      opacity: 0;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 0.85rem;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .grocery-item:hover .grocery-item-delete { opacity: 0.5; }
    .grocery-item-delete:hover { opacity: 1 !important; color: #c0392b; }

    /* DRAWER FOOTER */
    .drawer-footer {
      padding: 1rem 1.4rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .drawer-footer button {
      flex: 1;
      padding: 0.55rem 0.8rem;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn-clear-checked {
      background: var(--cream);
      border: 1.5px solid var(--border);
      color: var(--ink-light);
    }
    .btn-clear-checked:hover { background: var(--border); color: var(--ink); }
    .btn-clear-all {
      background: none;
      border: 1.5px solid #e0c0c0;
      color: #c0392b;
    }
    .btn-clear-all:hover { background: #fdf0f0; }
    .btn-undo {
      background: var(--cream);
      border: 1.5px solid var(--border);
      color: var(--ink-light);
    }
    .btn-undo:hover { background: var(--border); color: var(--ink); }

    /* ADD TO LIST button on recipe detail */
    .add-to-list-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .add-to-list-btn:hover { opacity: 0.85; }
    .add-to-list-btn svg { flex-shrink: 0; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--ink);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-family: 'Space Grotesk', sans-serif;
      z-index: 500;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* LAYOUT */
    .layout { display: flex; min-height: calc(100vh - 64px); }
    aside {
      width: 220px;
      flex-shrink: 0;
      padding: 2rem 1.2rem;
      border-right: 1px solid var(--border);
      background: var(--warm-white);
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .filter-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 0.6rem;
      margin-top: 1.4rem;
    }
    .filter-label:first-child { margin-top: 0; }
    .filter-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.4rem 0.6rem;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink-light);
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 0.1rem;
    }
    .filter-btn:hover { background: var(--cream); color: var(--ink); }
    .filter-btn.active { background: var(--terracotta-light); color: var(--terracotta); font-weight: 500; }
    .tag-pill {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.78rem;
      border: 1px solid var(--border);
      margin: 0.2rem 0.15rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      color: var(--ink-light);
    }
    .tag-pill:hover { background: var(--cream); }
    .tag-pill.active { background: var(--sage-light); border-color: var(--sage); color: var(--sage); }

    /* MAIN */
    main { flex: 1; padding: 2rem; max-width: 900px; }
    .results-info { font-size: 0.82rem; color: var(--ink-light); margin-bottom: 1.5rem; }

    /* GRID */
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.2rem; }
    .recipe-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.4rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .recipe-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(28,26,23,0.08);
      border-color: var(--terracotta-light);
    }
    .card-category { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--terracotta); margin-bottom: 0.5rem; }
    .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 0.5rem; }
    .card-desc { font-size: 0.83rem; color: var(--ink-light); line-height: 1.5; margin-bottom: 0.9rem; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .card-tag { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 20px; border: 1px solid var(--border); color: var(--ink-light); }

    /* DETAIL */
    #detail-view { display: none; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--ink-light);
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      padding: 0;
      margin-bottom: 2rem;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--terracotta); }
    .detail-category { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--terracotta); margin-bottom: 0.6rem; }
    .detail-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.8rem; font-weight: 600; line-height: 1.15; color: var(--ink); margin-bottom: 0.8rem; }
    .detail-desc { font-size: 1rem; color: var(--ink-light); font-style: italic; margin-bottom: 1.5rem; max-width: 560px; }
    .detail-meta { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .meta-item { font-size: 0.85rem; color: var(--ink-light); }
    .meta-item strong { color: var(--ink); }
    .servings-ctrl { display: flex; align-items: center; gap: 0.5rem; }
    .servings-ctrl button {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--ink-light);
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }
    .servings-ctrl button:hover { border-color: var(--terracotta); color: var(--terracotta); }
    .servings-ctrl span { font-size: 0.9rem; font-weight: 500; min-width: 1.5rem; text-align: center; }
    .detail-body { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; align-items: start; }
    .ingredients-box h2, .steps-box h2 { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 1.2rem; }
    .ingredients-list { list-style: none; }
    .ingredients-list li { display: flex; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; line-height: 1.4; }
    .ingredients-list li:last-child { border-bottom: none; }
    .ing-amount { color: var(--terracotta); font-weight: 500; white-space: nowrap; min-width: 70px; flex-shrink: 0; }
    .ing-name { color: var(--ink); }
    .ing-optional .ing-amount { color: var(--ink-light); font-weight: 400; }
    .ing-optional .ing-name { color: var(--ink-light); font-style: italic; }
    .ing-optional-header { font-size: 0.62rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); opacity: 0.6; padding: 0.8rem 0 0.2rem; }
    .steps-list { list-style: none; }
    .step-item { display: flex; gap: 1.2rem; margin-bottom: 1.8rem; cursor: pointer; }
    .step-item.optional .step-num { border-style: dashed; opacity: 0.6; }
    .step-item.optional .step-content h3 { color: var(--ink-light); font-weight: 500; }
    .step-item.optional .step-content p { opacity: 0.7; }
    .step-optional-label { font-size: 0.75rem; font-style: italic; font-weight: 400; color: var(--ink-light); opacity: 0.7; padding-right: 2px; }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--cream);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-light);
      flex-shrink: 0;
      margin-top: 0.1rem;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .step-item.done .step-num { background: var(--sage-light); border-color: var(--sage); color: var(--sage); }
    .step-content h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--ink); margin-bottom: 0.3rem; }
    .step-content p { font-size: 0.9rem; color: var(--ink-light); line-height: 1.6; }
    .step-item.done .step-content h3,
    .step-item.done .step-content p { opacity: 0.4; text-decoration: line-through; text-decoration-color: var(--sage); }
    .ing-inline { color: var(--terracotta); font-weight: 500; }
    .notes-box { margin-top: 2.5rem; padding: 1.4rem; background: var(--warm-white); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 4px; }
    .notes-box h3 { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.7rem; }
    .notes-box p { font-size: 0.88rem; color: var(--ink-light); line-height: 1.65; }
    .notes-box p br { display: block; margin-bottom: 0.4rem; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--ink-light); }
    .empty-state h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; margin-bottom: 0.5rem; color: var(--ink); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      aside { display: none; }
      main { padding: 1.2rem; }
      .detail-body { grid-template-columns: 1fr; gap: 2rem; }
      .detail-title { font-size: 2rem; }
      header { padding: 0 1rem; }
      .header-brand { font-size: 1.2rem; }
      .grocery-drawer { width: 100vw; }
    }
    @media (max-width: 480px) { .recipe-grid { grid-template-columns: 1fr; } }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .recipe-card { animation: fadeUp 0.3s ease both; }
    .recipe-card:nth-child(2) { animation-delay: 0.04s; }
    .recipe-card:nth-child(3) { animation-delay: 0.08s; }
    .recipe-card:nth-child(4) { animation-delay: 0.12s; }
    .recipe-card:nth-child(5) { animation-delay: 0.16s; }
    .recipe-card:nth-child(6) { animation-delay: 0.20s; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-brand" onclick="showList()">VinWin <span>Kitchen</span></div>

    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="openSearch()">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search-input" placeholder="Search recipes…" oninput="renderList()" />
    </div>

    <div class="header-right">
      <button class="cart-btn" onclick="openDrawer()" title="Grocery list">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
      <div class="lang-switcher" id="lang-switcher">
        <button class="lang-current-btn" id="lang-current-btn" onclick="toggleLangDropdown()" title="Language">🇬🇧</button>
        <div class="lang-dropdown" id="lang-dropdown">
          <button class="lang-option" onclick="pickLang('en')" title="English">🇬🇧</button>
          <button class="lang-option" onclick="pickLang('nl')" title="Nederlands">🇳🇱</button>
          <button class="lang-option" onclick="pickLang('es')" title="Español">🇪🇸</button>
        </div>
      </div>
    </div>
  </header>

  <!-- SEARCH OVERLAY (mobile) -->
  <div class="search-overlay" id="search-overlay" onclick="closeSearchIfOutside(event)">
    <div class="search-overlay-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.4;flex-shrink:0">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search-overlay-input" placeholder="Search recipes…" oninput="overlaySearch()" />
      <button class="search-cancel" onclick="closeSearch()" id="cancel-btn">Cancel</button>
    </div>
  </div>

  <!-- GROCERY DRAWER -->
  <div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
  <div class="grocery-drawer" id="grocery-drawer">
    <div class="drawer-header">
      <span class="drawer-title" id="drawer-title">Grocery List</span>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body" id="drawer-body">
      <div class="drawer-empty" id="drawer-empty">
        <div class="drawer-empty-icon">🛒</div>
        <p id="drawer-empty-text">Your list is empty.<br>Add ingredients from a recipe or type above.</p>
      </div>
      <div id="grocery-items"></div>
    </div>
    <div class="drawer-add-row">
      <input type="text" id="manual-item-input" placeholder="Add an item…" onkeydown="if(event.key==='Enter')addManualItem()" />
      <button onclick="addManualItem()" id="drawer-add-btn">Add</button>
    </div>
    <div class="drawer-footer" id="drawer-footer" style="display:none">
      <button class="btn-undo" onclick="undoLast()" id="btn-undo" style="display:none">Undo</button>
      <button class="btn-clear-checked" onclick="clearChecked()" id="btn-clear-checked">Clear checked</button>
      <button class="btn-clear-all" onclick="clearAll()" id="btn-clear-all">Clear all</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <div class="layout">
    <aside id="sidebar">
      <div class="filter-label" id="label-category">Category</div>
      <div id="category-filters"></div>
      <div class="filter-label" id="label-tags">Tags</div>
      <div id="tag-filters"></div>
    </aside>

    <main>
      <div id="list-view">
        <p class="results-info" id="results-info"></p>
        <div class="recipe-grid" id="recipe-grid"></div>
        <div class="empty-state" id="empty-state" style="display:none">
          <h3 id="empty-title">Nothing found</h3>
          <p id="empty-sub">Try a different search or filter</p>
        </div>
      </div>

      <div id="detail-view">
        <button class="back-btn" onclick="showList()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          <span id="back-label">All recipes</span>
        </button>
        <div id="detail-content"></div>
      </div>
    </main>
  </div>
</div>

<!-- FIREBASE (compat SDK — no module/global bridging needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDzbv9kTFxxuvD5y5JZ-uLff13jTMW4KNY",
    authDomain: "vinwinkitchen.firebaseapp.com",
    databaseURL: "https://vinwinkitchen-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "vinwinkitchen",
    storageBucket: "vinwinkitchen.firebasestorage.app",
    messagingSenderId: "489470168636",
    appId: "1:489470168636:web:17a7c8a6ca3471e2c3fd39"
  });

  const _db = firebase.database();
  const _listRef = _db.ref('groceryList');

  // Listen for real-time changes
  _listRef.on('value', (snapshot) => {
    window._groceryItems = snapshot.val() || {};
    if (window.renderGroceryDrawer) window.renderGroceryDrawer();
  });

  // Grocery DB helpers — called directly, no bridging
  window._pushItem = (item) => _listRef.push(item);
  window._updateItem = (key, data) => _db.ref('groceryList/' + key).update(data);
  window._removeItem = (key) => _db.ref('groceryList/' + key).remove();
</script>

<script>
  const RECIPE_FILE = 'recipes.json';

  let recipes = [];
  let activeCategory = 'All';
  let activeTags = new Set();
  let currentServings = {};
  let coffeeGrams = {};
  let lang = 'en';

  // Grocery state (populated by Firebase listener)
  window._groceryItems = {};

  // UI translations
  const UI = {
    en: {
      searchPlaceholder: 'Search recipes…',
      cancel: 'Cancel',
      category: 'Category',
      tags: 'Tags',
      all: 'All',
      servings: 'Servings',
      ingredients: 'ingredients',
      steps: 'steps',
      ingredientsLabel: 'Ingredients',
      methodLabel: 'Method',
      notesLabel: 'Notes',
      backLabel: 'All recipes',
      emptyTitle: 'Nothing found',
      emptySub: 'Try a different search or filter',
      resultsAll: (n) => `${n} recipes`,
      resultsFiltered: (n, t) => `${n} of ${t} recipes`,
      drawerTitle: 'Grocery List',
      drawerAdd: 'Add',
      drawerPlaceholder: 'Add an item…',
      drawerEmpty: 'Your list is empty.\nAdd ingredients from a recipe or type above.',
      clearChecked: 'Clear checked',
      clearAll: 'Clear all',
      addToList: 'Add to grocery list',
      undo: 'Undo',
      addedToast: (n) => `${n} ingredient${n === 1 ? '' : 's'} added to list`,
    },
    nl: {
      searchPlaceholder: 'Recepten zoeken…',
      cancel: 'Annuleren',
      category: 'Categorie',
      tags: 'Labels',
      all: 'Alles',
      servings: 'Porties',
      ingredients: 'ingrediënten',
      steps: 'stappen',
      ingredientsLabel: 'Ingrediënten',
      methodLabel: 'Bereiding',
      notesLabel: 'Notities',
      backLabel: 'Alle recepten',
      emptyTitle: 'Niets gevonden',
      emptySub: 'Probeer een andere zoekopdracht of filter',
      resultsAll: (n) => `${n} recepten`,
      resultsFiltered: (n, t) => `${n} van ${t} recepten`,
      drawerTitle: 'Boodschappenlijst',
      drawerAdd: 'Toevoegen',
      drawerPlaceholder: 'Item toevoegen…',
      drawerEmpty: 'Je lijst is leeg.\nVoeg ingrediënten toe vanuit een recept of typ hierboven.',
      clearChecked: 'Verwijder afgevinkte',
      clearAll: 'Alles verwijderen',
      addToList: 'Toevoegen aan boodschappenlijst',
      undo: 'Ongedaan',
      addedToast: (n) => `${n} ingrediënt${n === 1 ? '' : 'en'} toegevoegd`,
    },
    es: {
      searchPlaceholder: 'Buscar recetas…',
      cancel: 'Cancelar',
      category: 'Categoría',
      tags: 'Etiquetas',
      all: 'Todas',
      servings: 'Porciones',
      ingredients: 'ingredientes',
      steps: 'pasos',
      ingredientsLabel: 'Ingredientes',
      methodLabel: 'Elaboración',
      notesLabel: 'Notas',
      backLabel: 'Todas las recetas',
      emptyTitle: 'Nada encontrado',
      emptySub: 'Prueba otra búsqueda o filtro',
      resultsAll: (n) => `${n} recetas`,
      resultsFiltered: (n, t) => `${n} de ${t} recetas`,
      drawerTitle: 'Lista de la compra',
      drawerAdd: 'Añadir',
      drawerPlaceholder: 'Añadir un artículo…',
      drawerEmpty: 'Tu lista está vacía.\nAñade ingredientes desde una receta o escribe arriba.',
      clearChecked: 'Borrar marcados',
      clearAll: 'Borrar todo',
      addToList: 'Añadir a la lista',
      undo: 'Deshacer',
      addedToast: (n) => `${n} ingrediente${n === 1 ? '' : 's'} añadido${n === 1 ? '' : 's'}`,
    }
  };

  function t(key) { return UI[lang][key]; }

  const LANG_FLAGS = { en: '🇬🇧', nl: '🇳🇱', es: '🇪🇸' };

  function toggleLangDropdown() {
    document.getElementById('lang-dropdown').classList.toggle('open');
  }

  function pickLang(newLang) {
    document.getElementById('lang-dropdown').classList.remove('open');
    setLang(newLang);
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    const switcher = document.getElementById('lang-switcher');
    if (switcher && !switcher.contains(e.target)) {
      document.getElementById('lang-dropdown').classList.remove('open');
    }
  });

  function setLang(newLang) {
    lang = newLang;
    const btn = document.getElementById('lang-current-btn');
    if (btn) btn.textContent = LANG_FLAGS[lang] || '🇬🇧';
    updateUIText();
    buildFilters();
    const currentDetail = document.getElementById('detail-view');
    if (currentDetail.style.display !== 'none') {
      if (window._currentRecipeId) showDetail(window._currentRecipeId, { pushState: false });
    } else {
      renderList();
    }
    renderGroceryDrawer();
  }

  function updateUIText() {
    document.getElementById('search-input').placeholder = t('searchPlaceholder');
    document.getElementById('search-overlay-input').placeholder = t('searchPlaceholder');
    document.getElementById('cancel-btn').textContent = t('cancel');
    document.getElementById('label-category').textContent = t('category');
    document.getElementById('label-tags').textContent = t('tags');
    document.getElementById('back-label').textContent = t('backLabel');
    document.getElementById('empty-title').textContent = t('emptyTitle');
    document.getElementById('empty-sub').textContent = t('emptySub');
    document.getElementById('drawer-title').textContent = t('drawerTitle');
    document.getElementById('drawer-add-btn').textContent = t('drawerAdd');
    document.getElementById('manual-item-input').placeholder = t('drawerPlaceholder');
    document.getElementById('btn-clear-checked').textContent = t('clearChecked');
    document.getElementById('btn-clear-all').textContent = t('clearAll');
    document.getElementById('btn-undo').textContent = t('undo');
  }

  function loc(field) {
    if (typeof field === 'string') return field;
    return field[lang] || field['en'] || '';
  }

  // ── GROCERY DRAWER ─────────────────────────────────────────────

  function openDrawer() {
    document.getElementById('grocery-drawer').classList.add('open');
    document.getElementById('drawer-backdrop').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('grocery-drawer').classList.remove('open');
    document.getElementById('drawer-backdrop').classList.remove('open');
  }

  // Undo stack — stores {key, text, checked} of last action
  window._undoStack = [];

  window.renderGroceryDrawer = function() {
    const items = window._groceryItems || {};
    const keys = Object.keys(items);
    const badge = document.getElementById('cart-badge');
    const uncheckedCount = keys.filter(k => !items[k].checked).length;

    // Badge
    badge.textContent = uncheckedCount;
    badge.classList.toggle('visible', uncheckedCount > 0);

    const container = document.getElementById('grocery-items');
    const empty = document.getElementById('drawer-empty');
    const footer = document.getElementById('drawer-footer');
    const undoBtn = document.getElementById('btn-undo');

    // Show undo button only when there's something to undo
    if (undoBtn) undoBtn.style.display = window._undoStack.length > 0 ? 'block' : 'none';

    if (keys.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      footer.style.display = window._undoStack.length > 0 ? 'flex' : 'none';
      return;
    }

    empty.style.display = 'none';
    footer.style.display = 'flex';

    // Sort: unchecked first, then checked; within each group keep insertion order
    const sorted = keys.sort((a, b) => {
      if (items[a].checked === items[b].checked) return 0;
      return items[a].checked ? 1 : -1;
    });

    container.innerHTML = sorted.map(key => {
      const item = items[key];
      return `
        <div class="grocery-item ${item.checked ? 'checked' : ''}" id="gi-${key}" onclick="toggleGroceryItem('${key}', ${!item.checked})">
          <input type="checkbox" ${item.checked ? 'checked' : ''} readonly />
          <span class="grocery-item-text">${escHtml(item.text)}</span>
          <button class="grocery-item-delete" onclick="event.stopPropagation();deleteGroceryItem('${key}')" title="Remove">✕</button>
        </div>`;
    }).join('');
  };

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addManualItem() {
    const input = document.getElementById('manual-item-input');
    const text = input.value.trim();
    if (!text || !window._pushItem) return;
    window._pushItem({ text, checked: false, ts: Date.now() });
    input.value = '';
  }

  window.toggleGroceryItem = function(key, checked) {
    if (!window._updateItem) return;
    const item = (window._groceryItems || {})[key];
    if (item) window._undoStack.push({ type: 'toggle', key, checked: !checked, text: item.text });

    // Animate the crossing before Firebase re-renders
    if (checked) {
      const el = document.getElementById('gi-' + key);
      if (el) {
        el.classList.add('crossing');
        setTimeout(() => window._updateItem(key, { checked }), 380);
      } else {
        window._updateItem(key, { checked });
      }
    } else {
      window._updateItem(key, { checked });
    }

    const undoBtn = document.getElementById('btn-undo');
    if (undoBtn) undoBtn.style.display = 'block';
    const footer = document.getElementById('drawer-footer');
    if (footer) footer.style.display = 'flex';
  };

  window.deleteGroceryItem = function(key) {
    if (!window._removeItem) return;
    const item = (window._groceryItems || {})[key];
    if (item) window._undoStack.push({ type: 'delete', key, text: item.text, checked: item.checked });
    window._removeItem(key);
    const undoBtn = document.getElementById('btn-undo');
    if (undoBtn) undoBtn.style.display = 'block';
    const footer = document.getElementById('drawer-footer');
    if (footer) footer.style.display = 'flex';
  };

  function undoLast() {
    const action = window._undoStack.pop();
    if (!action) return;
    if (action.type === 'toggle') {
      window._updateItem(action.key, { checked: action.checked });
    } else if (action.type === 'delete') {
      window._pushItem({ text: action.text, checked: action.checked, ts: Date.now() });
    } else if (action.type === 'clearChecked') {
      action.items.forEach(i => window._pushItem({ text: i.text, checked: false, ts: Date.now() }));
    } else if (action.type === 'clearAll') {
      action.items.forEach(i => window._pushItem({ text: i.text, checked: i.checked, ts: Date.now() }));
    }
    if (window._undoStack.length === 0) {
      const undoBtn = document.getElementById('btn-undo');
      if (undoBtn) undoBtn.style.display = 'none';
    }
  }

  function clearChecked() {
    const items = window._groceryItems || {};
    const toDelete = Object.keys(items).filter(k => items[k].checked).map(k => ({ key: k, ...items[k] }));
    if (toDelete.length === 0) return;
    window._undoStack.push({ type: 'clearChecked', items: toDelete });
    toDelete.forEach(i => window._removeItem(i.key));
  }

  function clearAll() {
    const items = window._groceryItems || {};
    const all = Object.keys(items).map(k => ({ key: k, ...items[k] }));
    if (all.length === 0) return;
    window._undoStack.push({ type: 'clearAll', items: all });
    all.forEach(i => window._removeItem(i.key));
  }

  function addRecipeToList(recipeId) {
    const r = recipes.find(x => x.id === recipeId);
    if (!r || !window._pushItem) return;
    const srv = currentServings[recipeId] || r.servings;
    const ratio = srv / r.servings;
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);

    r.ingredients.forEach(ing => {
      const scaledAmt = fmtAmt(ing.amount, ratio);
      const showUnit = ing.unit && !countableUnits.has(ing.unit);
      const amtStr = showUnit ? `${scaledAmt} ${ing.unit}` : scaledAmt;
      const name = loc(ing.name);
      const text = showUnit ? `${amtStr} ${name}` : `${scaledAmt} ${name}`;
      window._pushItem({ text: text.trim(), checked: false, ts: Date.now() });
    });

    showToast(t('addedToast')(r.ingredients.length));
    openDrawer();
  }

  let _toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // ── RECIPES ────────────────────────────────────────────────────

  async function loadRecipes() {
    try {
      const res = await fetch(RECIPE_FILE + '?v=' + Date.now());
      recipes = await res.json();
      buildFilters();
      renderList();
    } catch(e) { console.error('Could not load recipes.json', e); }
  }

  function buildFilters() {
    const allLabel = t('all');
    const categories = [allLabel, ...new Set(recipes.map(r => loc(r.category)))];
    const tags = [...new Set(recipes.flatMap(r => r.tags))];

    document.getElementById('category-filters').innerHTML = categories.map(c => {
      const isAll = c === allLabel;
      const active = isAll ? (activeCategory === 'All') : (loc(recipes.find(r => loc(r.category) === c)?.category) === activeCategory || c === activeCategory);
      return `<button class="filter-btn ${active ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`;
    }).join('');

    document.getElementById('tag-filters').innerHTML = tags.map(tg =>
      `<span class="tag-pill ${activeTags.has(tg) ? 'active' : ''}" onclick="toggleTag('${tg}')">${tg}</span>`
    ).join('');
  }

  function setCategory(cat) {
    activeCategory = cat === t('all') ? 'All' : cat;
    buildFilters();
    renderList();
  }

  function toggleTag(tag) {
    activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
    buildFilters();
    renderList();
  }

  function getFiltered() {
    const q = (document.getElementById('search-input')?.value || '').toLowerCase();
    return recipes.filter(r => {
      const catMatch = activeCategory === 'All' || loc(r.category) === activeCategory || r.category === activeCategory;
      if (!catMatch) return false;
      if (activeTags.size > 0 && ![...activeTags].every(tag => r.tags.includes(tag))) return false;
      if (q) {
        const title = loc(r.title).toLowerCase();
        const desc = loc(r.description).toLowerCase();
        const cat = loc(r.category).toLowerCase();
        const tags = r.tags.join(' ').toLowerCase();
        if (!title.includes(q) && !desc.includes(q) && !cat.includes(q) && !tags.includes(q)) return false;
      }
      return true;
    });
  }

  function renderList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    const filtered = getFiltered();
    const grid = document.getElementById('recipe-grid');
    const empty = document.getElementById('empty-state');
    const info = document.getElementById('results-info');

    info.textContent = filtered.length === recipes.length
      ? t('resultsAll')(recipes.length)
      : t('resultsFiltered')(filtered.length, recipes.length);

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(r => `
      <div class="recipe-card" onclick="showDetail('${r.id}')">
        <div class="card-category">${loc(r.category)}</div>
        <div class="card-title">${loc(r.title)}</div>
        <div class="card-desc">${loc(r.description)}</div>
        <div class="card-tags">${r.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}</div>
      </div>`).join('');
  }

  function showDetail(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    window._currentRecipeId = id;
    if (!currentServings[id]) currentServings[id] = r.servings;
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    renderDetail(r);
    window.scrollTo(0, 0);
  }

  function fmtAmt(amount, ratio) {
    const val = amount * ratio;
    if (val === 0) return '';
    if (val >= 10 || Number.isInteger(val)) return Math.round(val).toString();
    if (val < 1) {
      const fracs = [[1,8],[1,4],[1,3],[1,2],[2,3],[3,4]];
      let best = fracs[0], bestDiff = Infinity;
      fracs.forEach(f => { const d = Math.abs(val - f[0]/f[1]); if (d < bestDiff) { best = f; bestDiff = d; }});
      return `${best[0]}/${best[1]}`;
    }
    return parseFloat(val.toFixed(1)).toString();
  }

  function buildIngMap(ingredients, ratio) {
    const map = {};
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);
    ingredients.forEach(ing => {
      const scaledAmt = fmtAmt(ing.amount, ratio);
      const showUnit = ing.unit && !countableUnits.has(ing.unit);
      const amtStr = showUnit ? `${scaledAmt}${ing.unit}` : scaledAmt;
      const name = loc(ing.name);
      const display = (ing.unit && countableUnits.has(ing.unit)) ? `${scaledAmt} ${name}` : `${amtStr} ${name}`;
      map[ing.id] = `<span class="ing-inline">${display}</span>`;
    });
    return map;
  }

  function resolveStepContent(content, ingMap) {
    return content.replace(/\{(i\d+)\}/g, (match, id) => ingMap[id] || match);
  }

  function renderDetail(r) {
    const srv = currentServings[r.id];
    // For Aeropress: ratio is driven by coffeeGrams, not servings
    const isAeropress = r.id === 'aeropress-hoffmann';
    const baseGrams = 11; // base coffee amount in recipe
    if (isAeropress && coffeeGrams[r.id] === undefined) coffeeGrams[r.id] = baseGrams;
    const ratio = isAeropress ? (coffeeGrams[r.id] / baseGrams) : (srv / r.servings);
    const countableUnits = new Set(['cloves','clove','large','medium','orange','lemon','sprig','sprigs','stalk','stalks','pinch']);
    const ingMap = buildIngMap(r.ingredients, ratio);

    const requiredIngs = r.ingredients.filter(ing => !ing.optional);
    const optionalIngs = r.ingredients.filter(ing => ing.optional);
    const renderIng = (ing, isOptional) => {
      const scaledAmt = fmtAmt(ing.amount, ratio);
      const showUnit = ing.unit && !countableUnits.has(ing.unit);
      const amtStr = showUnit ? `${scaledAmt} ${ing.unit}` : scaledAmt;
      return `<li class="${isOptional ? 'ing-optional' : ''}"><span class="ing-amount">${amtStr}</span><span class="ing-name">${loc(ing.name)}</span></li>`;
    };
    const optionalLabel = { en: 'Optional', nl: 'Optioneel', es: 'Opcional' };
    const ingList = [
      ...requiredIngs.map(ing => renderIng(ing, false)),
      ...(optionalIngs.length ? [`<li class="ing-optional-header">${optionalLabel[lang] || 'Optional'}</li>`, ...optionalIngs.map(ing => renderIng(ing, true))] : [])
    ].join('');

    const optionalStepLabel = { en: 'optional', nl: 'optioneel', es: 'opcional' };
    const stepList = r.steps.map((s, i) => `
      <li class="step-item${s.optional ? ' optional' : ''}" onclick="toggleStep(this)">
        <div class="step-num">${i + 1}</div>
        <div class="step-content">
          <h3>${loc(s.title)}${s.optional ? ` <em class="step-optional-label">— ${optionalStepLabel[lang] || 'optional'}</em>` : ''}</h3>
          <p>${resolveStepContent(loc(s.content), ingMap)}</p>
        </div>
      </li>`).join('');

    const notes = loc(r.notes);

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-category">${loc(r.category)}</div>
      <h1 class="detail-title">${loc(r.title)}</h1>
      <p class="detail-desc">${loc(r.description)}</p>
      <div class="detail-meta">
        ${isAeropress ? `
        <div class="meta-item"><strong>Coffee</strong></div>
        <div class="servings-ctrl">
          <button onclick="changeCoffeeGrams('${r.id}', -1)">−</button>
          <span id="grams-display">${coffeeGrams[r.id]}g</span>
          <button onclick="changeCoffeeGrams('${r.id}', 1)">+</button>
        </div>` : `
        <div class="meta-item"><strong>${t('servings')}</strong></div>
        <div class="servings-ctrl">
          <button onclick="changeServings('${r.id}', -1)">−</button>
          <span id="srv-display">${srv}</span>
          <button onclick="changeServings('${r.id}', 1)">+</button>
        </div>`}
      </div>
      <div class="detail-body">
        <div class="ingredients-box">
          <h2>${t('ingredientsLabel')}</h2>
          <ul class="ingredients-list">${ingList}</ul>
          <button class="add-to-list-btn" onclick="addRecipeToList('${r.id}')" style="margin-top:1.2rem">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            ${t('addToList')}
          </button>
        </div>
        <div class="steps-box">
          <h2>${t('methodLabel')}</h2>
          <ul class="steps-list">${stepList}</ul>
          ${notes ? `<div class="notes-box"><h3>${t('notesLabel')}</h3><p>${notes}</p></div>` : ''}
        </div>
      </div>`;
  }

  function changeServings(id, delta) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    currentServings[id] = Math.max(1, (currentServings[id] || r.servings) + delta);
    renderDetail(r);
  }

  function changeCoffeeGrams(id, delta) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    if (coffeeGrams[id] === undefined) coffeeGrams[id] = 11;
    coffeeGrams[id] = Math.max(1, coffeeGrams[id] + delta);
    renderDetail(r);
  }

  function toggleStep(el) { el.classList.toggle('done'); }

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    window._currentRecipeId = null;
  }

  function openSearch() {
    if (window.innerWidth <= 768) {
      document.getElementById('search-overlay').classList.add('active');
      setTimeout(() => document.getElementById('search-overlay-input').focus(), 50);
    }
  }
  function closeSearch() {
    document.getElementById('search-overlay').classList.remove('active');
    document.getElementById('search-overlay-input').value = '';
    document.getElementById('search-input').value = '';
    renderList();
  }
  function closeSearchIfOutside(e) {
    if (e.target === document.getElementById('search-overlay')) closeSearch();
  }
  function overlaySearch() {
    document.getElementById('search-input').value = document.getElementById('search-overlay-input').value;
    renderList();
  }

  loadRecipes();
</script>
</body>
</html>
