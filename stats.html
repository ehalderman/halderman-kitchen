<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VinWin Kitchen — Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F8F8F2; --warm-white: #FFFFF5; --ink: #101030; --ink-light: #404060;
      --terracotta: #D4B800; --terracotta-light: #F0E890; --terracotta-text: #7A6800;
      --sage: #2A6B3A; --sage-light: #C8E0CC; --border: #D8D890;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
    header {
      background: var(--warm-white); border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 500; color: var(--ink); text-decoration: none; }
    .brand span { color: var(--terracotta); font-style: italic; }
    .back-link { font-size: 0.85rem; color: var(--ink-light); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    .back-link:hover { color: var(--ink); }
    main { max-width: 860px; margin: 0 auto; padding: 2rem; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 600; margin-bottom: 0.3rem; }
    .subtitle { color: var(--ink-light); font-size: 0.88rem; margin-bottom: 2rem; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
    .stat-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.2rem; }
    .stat-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.3rem; }
    .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 600; color: var(--ink); }
    .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; color: var(--ink); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .recipe-row {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.6rem 0; border-bottom: 0.5px solid var(--border);
    }
    .recipe-row:last-child { border-bottom: none; }
    .recipe-rank { font-size: 0.75rem; font-weight: 500; color: var(--ink-light); min-width: 24px; text-align: right; }
    .recipe-color { width: 8px; height: 28px; border-radius: 3px; flex-shrink: 0; }
    .recipe-name { flex: 1; font-size: 0.92rem; color: var(--ink); }
    .recipe-cat { font-size: 0.75rem; color: var(--ink-light); }
    .bar-wrap { width: 140px; flex-shrink: 0; }
    .bar-bg { background: var(--cream); border-radius: 20px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 20px; background: var(--sage); transition: width 0.4s ease; }
    .bar-fill.made { background: var(--terracotta-text); }
    .count { font-size: 0.82rem; font-weight: 500; color: var(--ink-light); min-width: 32px; text-align: right; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab { padding: 0.35rem 0.9rem; border: 1.5px solid var(--border); border-radius: 20px; background: none; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; color: var(--ink-light); cursor: pointer; transition: all 0.15s; }
    .tab.active { background: var(--ink); border-color: var(--ink); color: white; }
    .loading { color: var(--ink-light); font-size: 0.88rem; padding: 3rem 0; text-align: center; }
    .last-made { font-size: 0.73rem; color: var(--ink-light); margin-left: 0.3rem; }
    @media (max-width: 600px) { main { padding: 1rem; } .bar-wrap { width: 80px; } header { padding: 0 1rem; } }
  </style>
</head>
<body>
<header>
  <a class="brand" href="/">VinWin <span>Kitchen</span></a>
  <a class="back-link" href="/">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
    Back to recipes
  </a>
</header>

<main>
  <h1>Stats</h1>
  <p class="subtitle">View counts and cooking activity across all recipes</p>

  <div class="summary-grid" id="summary-grid">
    <div class="stat-card"><div class="stat-label">Total views</div><div class="stat-value" id="total-views">—</div></div>
    <div class="stat-card"><div class="stat-label">Times cooked</div><div class="stat-value" id="total-made">—</div></div>
    <div class="stat-card"><div class="stat-label">Recipes viewed</div><div class="stat-value" id="recipes-viewed">—</div></div>
    <div class="stat-card"><div class="stat-label">Most popular</div><div class="stat-value" id="most-popular" style="font-size:1rem;padding-top:0.3rem">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('views', this)">Views</button>
    <button class="tab" onclick="switchTab('made', this)">Cooked</button>
  </div>

  <div class="section-title" id="table-title">Most viewed recipes</div>
  <div id="recipe-list"><div class="loading">Loading…</div></div>
</main>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyBvJCiWzYgxLGiRPOQjnBgQFm6hZqhf_TA",
    authDomain: "vinwinkitchen.firebaseapp.com",
    databaseURL: "https://vinwinkitchen-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "vinwinkitchen",
    storageBucket: "vinwinkitchen.firebasestorage.app",
    messagingSenderId: "489470168636",
    appId: "1:489470168636:web:17a7c8a6ca3471e2c3fd39"
  });

  const db = firebase.database();
  let recipes = [];
  let viewCounts = {};
  let madeItCounts = {};
  let currentTab = 'views';

  const RECIPE_COLORS = {
    "hummus": "#A85F10", "tzatziki": "#25704A", "gazpacho": "#C0392B",
    "white-bean-soup": "#4A5F7A", "tikka-masala": "#B35A1A", "byrek": "#3D6644",
    "polenta-fritters": "#5C6A25", "polenta-porridge": "#9C5A15",
    "quesadilla-zwarte-bonen-pompoen": "#8B4513", "banana-bread": "#A0522D",
    "muffins-blueberry-lemon": "#5B4B8A", "pepas": "#8A6008",
    "quinoa-pancakes": "#6E5A3A", "cranberry-compote": "#9B2335",
    "silken-tofu-pudding": "#6B5B95", "bircher-muesli": "#6A5A2A",
    "water-kefir": "#A03560", "naan": "#7A5E38",
    "blueberry-protein-biscuits": "#3B5998", "halloumi-tomatoes-white-beans": "#A04428",
    "flash-cold-brew": "#4A3728", "aeropress-hoffmann": "#3D2B1A",
    "french-press-hoffmann": "#5C3A1E", "aeropress-bypass": "#2C1F14",
  };

  async function init() {
    // Load recipes
    const res = await fetch('/recipes.json');
    recipes = await res.json();

    // Load Firebase data
    const [viewsSnap, madeSnap] = await Promise.all([
      db.ref('recipeViews').once('value'),
      db.ref('madeIt').once('value'),
    ]);
    viewCounts = viewsSnap.val() || {};
    madeItCounts = madeSnap.val() || {};

    updateSummary();
    renderTable();
  }

  function updateSummary() {
    const totalViews = Object.values(viewCounts).reduce((a, b) => a + b, 0);
    const totalMade = Object.values(madeItCounts).reduce((a, v) => a + (v.count || 0), 0);
    const recipesViewed = Object.keys(viewCounts).filter(k => viewCounts[k] > 0).length;
    const topId = Object.entries(viewCounts).sort((a, b) => b[1] - a[1])[0];
    const topRecipe = topId ? recipes.find(r => r.id === topId[0]) : null;

    document.getElementById('total-views').textContent = totalViews.toLocaleString();
    document.getElementById('total-made').textContent = totalMade.toLocaleString();
    document.getElementById('recipes-viewed').textContent = recipesViewed + ' / ' + recipes.length;
    document.getElementById('most-popular').textContent = topRecipe
      ? (topRecipe.title.en || topRecipe.title)
      : '—';
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('table-title').textContent =
      tab === 'views' ? 'Most viewed recipes' : 'Most cooked recipes';
    renderTable();
  }

  function renderTable() {
    const list = document.getElementById('recipe-list');

    const rows = recipes.map(r => {
      const views = viewCounts[r.id] || 0;
      const made = (madeItCounts[r.id] || {}).count || 0;
      const lastMade = (madeItCounts[r.id] || {}).lastMade || null;
      return { r, views, made, lastMade };
    });

    const sorted = currentTab === 'views'
      ? rows.sort((a, b) => b.views - a.views)
      : rows.sort((a, b) => b.made - a.made);

    const maxVal = sorted[0] ? Math.max(1, currentTab === 'views' ? sorted[0].views : sorted[0].made) : 1;

    list.innerHTML = sorted.map(({ r, views, made, lastMade }, i) => {
      const val = currentTab === 'views' ? views : made;
      const pct = Math.round((val / maxVal) * 100);
      const color = RECIPE_COLORS[r.id] || '#2A6B3A';
      const catEn = (r.category && r.category.en) || r.category || '';
      const titleEn = (r.title && r.title.en) || r.title || r.id;
      const lastMadeStr = lastMade
        ? `<span class="last-made">· last ${new Date(lastMade).toLocaleDateString('en', {month:'short', day:'numeric'})}</span>`
        : '';
      return `
        <div class="recipe-row">
          <span class="recipe-rank">${i + 1}</span>
          <div class="recipe-color" style="background:${color}"></div>
          <div style="flex:1;min-width:0">
            <div class="recipe-name">${titleEn}${currentTab === 'made' ? lastMadeStr : ''}</div>
            <div class="recipe-cat">${catEn}</div>
          </div>
          <div class="bar-wrap">
            <div class="bar-bg"><div class="bar-fill ${currentTab === 'made' ? 'made' : ''}" style="width:${pct}%"></div></div>
          </div>
          <span class="count">${val}</span>
        </div>`;
    }).join('');
  }

  init().catch(e => {
    document.getElementById('recipe-list').innerHTML = '<div class="loading">Could not load data.</div>';
    console.error(e);
  });
</script>
</body>
</html>
